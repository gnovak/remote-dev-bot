name: Remote Dev Bot

# Reusable workflow — called by thin shims in target repos.
# See .github/workflows/agent.yml for the shim template.
#
# Supports modes via /agent-<mode>[-<model>] or /agent <mode> [<model>]:
#   /agent-resolve[-<model>] or /agent resolve [<model>]     — run LiteLLM agent loop to resolve the issue, open a PR
#   /agent-design[-<model>] or /agent design [<model>]       — post a design analysis comment (no code changes)
#   /agent-review[-<model>] or /agent review [<model>]       — post a code review comment on a PR (no code changes)
#   /agent-reconcile[-<model>] or /agent reconcile [<model>] — rebase PR onto base branch, resolve conflicts, force-push
# Both dash and space separators are supported for mobile-friendly typing.
#
# Arguments can be passed on subsequent lines:
#   /agent resolve
#   max iterations = 75
#   branch = my-feature
#
# Argument names are normalized (spaces/dashes/underscores are equivalent).
# Supported arguments: max_iterations, timeout_minutes, branch, extra_files.

on:
  workflow_call:
    inputs:
      rdb_ref:
        description: 'Branch or tag of remote-dev-bot to use for config and lib files. Must match the @ref used in the shim''s `uses:` line.'
        required: false
        default: 'main'
        type: string
      command_prefix:
        description: 'Command prefix the shim triggers on (e.g. "agent" for /agent-resolve). Default: agent.'
        required: false
        default: 'agent'
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      RDB_PAT_TOKEN:
        required: false
      RDB_APP_PRIVATE_KEY:
        required: false
      E2E_TEST_TOKEN:
        required: false

jobs:
  # --- Shared setup: parse config, determine mode and model ---
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      mode: ${{ steps.parse.outputs.mode }}
      model: ${{ steps.parse.outputs.model }}
      alias: ${{ steps.parse.outputs.alias }}
      max_iterations: ${{ steps.parse.outputs.max_iterations }}
      pr_type: ${{ steps.parse.outputs.pr_type }}
      on_failure: ${{ steps.parse.outputs.on_failure }}
      target_branch: ${{ steps.parse.outputs.target_branch }}
      target_branch_explicit: ${{ steps.parse.outputs.target_branch_explicit }}
      extra_files: ${{ steps.parse.outputs.extra_files }}
      assign_issue: ${{ steps.parse.outputs.assign_issue }}
      assign_pr: ${{ steps.parse.outputs.assign_pr }}
      graceful_wrapup_enabled: ${{ steps.parse.outputs.graceful_wrapup_enabled }}
      graceful_wrapup_iteration: ${{ steps.parse.outputs.graceful_wrapup_iteration }}
      timeout_minutes: ${{ steps.parse.outputs.timeout_minutes }}
      status_log_interval: ${{ steps.parse.outputs.status_log_interval }}
      design_context_keep_tool_results: ${{ steps.parse.outputs.design_context_keep_tool_results }}
      review_context_keep_tool_results: ${{ steps.parse.outputs.review_context_keep_tool_results }}
      workshop_max_iterations: ${{ steps.parse.outputs.workshop_max_iterations }}
      delegate_max_iterations: ${{ steps.parse.outputs.delegate_max_iterations }}
      council_models: ${{ steps.parse.outputs.council_models }}
      extra_instructions: ${{ steps.parse.outputs.extra_instructions }}
      model_extra_instructions: ${{ steps.parse.outputs.model_extra_instructions }}
      debug_logging: ${{ steps.parse.outputs.debug_logging }}
      distill_enabled: ${{ steps.parse.outputs.distill_enabled }}

    steps:
      - name: Generate app token
        if: vars.RDB_APP_ID != ''
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Checkout remote-dev-bot config
        uses: actions/checkout@v5
        with:
          repository: gnovak/remote-dev-bot
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ inputs.rdb_ref }}
          path: .remote-dev-bot
          sparse-checkout: |
            /remote-dev-bot.yaml
            /lib/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install PyYAML

      - name: Parse config and command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMAND_PREFIX: ${{ inputs.command_prefix || 'agent' }}
        run: |
          # Pass full comment body to config.py via COMMENT_BODY env var.
          # COMMAND_PREFIX tells config.py which slash command prefix to expect.
          # This enables multi-line argument parsing:
          #   /agent resolve
          #   max iterations = 75
          #   context = file1.txt file2.txt
          python3 .remote-dev-bot/lib/config.py

      - name: React to comment
        continue-on-error: true
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST --field content=rocket
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Assign commenter to issue
        if: steps.parse.outputs.assign_issue == 'true'
        continue-on-error: true
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
            --add-assignee "${{ github.event.comment.user.login }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

  # --- Mode: resolve — run LiteLLM agent loop, open a PR ---
  resolve:
    needs: parse
    if: needs.parse.outputs.mode == 'resolve'
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        if: vars.RDB_APP_ID != ''
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Checkout remote-dev-bot lib
        uses: actions/checkout@v5
        with:
          repository: gnovak/remote-dev-bot
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ inputs.rdb_ref }}
          path: .remote-dev-bot
          sparse-checkout: |
            /lib/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Determine API key
        id: apikey
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Select the correct API key based on the model's provider prefix.
          # Writing to GITHUB_OUTPUT passes values between steps as step outputs.
          # GitHub Actions automatically masks secret values in logs — this does
          # NOT print the key. The key is consumed by the next step as
          # ${{ steps.apikey.outputs.key }} and never appears in plaintext output.
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          # Helper: post a friendly comment when the required API key secret is missing.
          MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
          NO_API_KEY_WARNING="⚠️ **No API key configured for this model.**"
          post_no_api_key_comment() {
            local secret_name="$1"
            {
              printf '%s\n\n' "${MODEL_HEADER}"
              printf '%s\n\n' "${NO_API_KEY_WARNING}"
              printf 'The selected model \`%s\` (\`%s\`) requires an \`%s\` secret, but none was found.\n\n' "${ALIAS}" "${MODEL}" "${secret_name}"
              printf '**To fix:** Add your API key as a repository secret:\n'
              printf '\`\`\`bash\n'
              printf 'gh secret set %s --repo ${{ github.repository }}\n' "${secret_name}"
              printf '\`\`\`\n'
              printf 'Then re-trigger the bot by commenting the same command again.\n'
            } > /tmp/no_api_key_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/no_api_key_comment.md
          }

          if [[ "$MODEL" == anthropic/* ]]; then
            API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "ANTHROPIC_API_KEY"
              echo "::error::No ANTHROPIC_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == openai/* ]]; then
            API_KEY="${{ secrets.OPENAI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "OPENAI_API_KEY"
              echo "::error::No OPENAI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == gemini/* ]]; then
            API_KEY="${{ secrets.GEMINI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "GEMINI_API_KEY"
              echo "::error::No GEMINI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown model provider for: $MODEL"
            exit 1
          fi

      - name: Install dependencies
        run: pip install PyYAML litellm

      - name: Generate repo index
        run: |
          python3 .remote-dev-bot/lib/generate_index.py > /tmp/rdb-index.md
          EXTRA_FILES_RAW='${{ needs.parse.outputs.extra_files }}'
          RDB_EXTRA_FILES=$(python3 -c "import json,sys; raw=sys.argv[1]; files=json.loads(raw) if raw and raw not in ('null','') else []; files.append('/tmp/rdb-index.md'); print(json.dumps(files))" "$EXTRA_FILES_RAW")
          echo "RDB_EXTRA_FILES=$RDB_EXTRA_FILES" >> "$GITHUB_ENV"

      - name: Resolve issue
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GIT_USERNAME: ${{ github.repository_owner }}
          E2E_TEST_TOKEN: ${{ secrets.E2E_TEST_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TYPE: ${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}
          TARGET_BRANCH: ${{ needs.parse.outputs.target_branch }}
          TARGET_BRANCH_EXPLICIT: ${{ needs.parse.outputs.target_branch_explicit }}
          PR_TYPE: ${{ needs.parse.outputs.pr_type }}
          ON_FAILURE: ${{ needs.parse.outputs.on_failure }}
          MAX_ITERATIONS: ${{ needs.parse.outputs.max_iterations }}
          WRAPUP_ENABLED: ${{ needs.parse.outputs.graceful_wrapup_enabled }}
          WRAPUP_ITERATION: ${{ needs.parse.outputs.graceful_wrapup_iteration }}
          STATUS_LOG_INTERVAL: ${{ needs.parse.outputs.status_log_interval }}
          ALIAS: ${{ needs.parse.outputs.alias }}
          EXTRA_FILES: ${{ env.RDB_EXTRA_FILES }}
          EXTRA_INSTRUCTIONS: ${{ needs.parse.outputs.extra_instructions }}
          MODEL_EXTRA_INSTRUCTIONS: ${{ needs.parse.outputs.model_extra_instructions }}
          DEBUG_LOGGING: ${{ needs.parse.outputs.debug_logging }}
          DISTILL_ENABLED: ${{ needs.parse.outputs.distill_enabled }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          ISSUE_TYPE="${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}"
          TARGET_BRANCH_EXPLICIT="${{ needs.parse.outputs.target_branch_explicit }}"

          # For PR triggers: if no explicit branch was set, use the PR's own base branch.
          # For issue triggers: use the configured target_branch.
          if [[ "$ISSUE_TYPE" == "pr" && "$TARGET_BRANCH_EXPLICIT" != "true" ]]; then
            TARGET_BRANCH=$(gh pr view "$ISSUE_NUMBER" --json baseRefName --jq '.baseRefName')
            export TARGET_BRANCH
          fi

          TIMEOUT_MINUTES="${{ needs.parse.outputs.timeout_minutes }}"
          TIMEOUT_SECONDS=$((TIMEOUT_MINUTES * 60))
          echo "Resolver timeout: ${TIMEOUT_MINUTES} minutes"
          echo $(date +%s) > /tmp/start_time
          # Run agent loop under timeout. On expiry: SIGTERM first, then SIGKILL after 60s.
          # Subsequent cleanup steps run regardless via if:always().
          # /tmp/agent_start_sha is written by resolve.py/setup_branch() after
          # branching from TARGET_BRANCH — gives correct diff base even when
          # the workflow checkout lands on a different branch (e.g. main).
          timeout --kill-after=60 "$TIMEOUT_SECONDS" \
            python3 -u .remote-dev-bot/lib/resolve.py
          RESOLVE_EXIT_CODE=$?

          if [[ $RESOLVE_EXIT_CODE -eq 124 ]]; then
            echo "::warning::Resolver timed out after ${TIMEOUT_MINUTES} minutes. Cleanup steps will still run."
          fi

          exit $RESOLVE_EXIT_CODE

      - name: Safety-net push
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # If the agent made commits but forgot to push, or exhausted iterations without
          # calling finish(), save the work now. Skipped for no_op runs (nothing to push).
          NO_OP=$(python3 -c "import json,os; d=json.load(open('/tmp/resolve_status.json')) if os.path.exists('/tmp/resolve_status.json') else {}; print('true' if d.get('no_op') else 'false')" 2>/dev/null || echo "false")
          if [[ "$NO_OP" == "true" ]]; then
            echo "no_op run — skipping safety-net push"
            exit 0
          fi
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "WIP: auto-saved by workflow (agent did not commit before exiting)"
            echo "Committed uncommitted changes"
          fi
          git push origin HEAD 2>/dev/null || echo "Push failed or nothing to push"

      - name: Post result comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          ON_FAILURE="${{ needs.parse.outputs.on_failure }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          MODEL="${{ needs.parse.outputs.model }}"

          # Compute cost for inclusion in the result comment
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          MAX_ITER="${MAX_ITERATIONS:-}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")

          # Read resolve status written by resolve.py
          if [[ ! -f /tmp/resolve_status.json ]]; then
            # resolve.py crashed before writing status (OOM, import error, etc.)
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ⚠️ Agent process exited unexpectedly"
              echo ""
              echo "The agent process exited unexpectedly — see run logs for details."
              echo ""
              echo "See the [workflow run logs]($RUN_URL) for full details."
              echo ""
              echo "### 💰 Cost"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Time | ${ELAPSED_FMT} |"
              echo "| Iterations | ${ITERATIONS_FMT} |"
              echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
              echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
              printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
            } > /tmp/failure_comment.md

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/failure_comment.md
            echo "cost embedded" > /tmp/cost_embedded
            exit 0
          fi

          SUCCESS=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print('true' if d.get('success') else 'false')")
          NO_OP=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print('true' if d.get('no_op') else 'false')")
          EXPLANATION=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print(d.get('explanation',''))")

          if [[ "$NO_OP" == "true" ]]; then
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ℹ️ No change needed"
              echo ""
              echo "The agent investigated this issue and determined that no code change is required."
              echo ""
              if [[ -n "$EXPLANATION" ]]; then
                echo "**Agent's findings:**"
                echo ""
                echo "$EXPLANATION"
                echo ""
              fi
              echo "### 💰 Cost"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Time | ${ELAPSED_FMT} |"
              echo "| Iterations | ${ITERATIONS_FMT} |"
              echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
              echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
              printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
            } > /tmp/noop_comment.md

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/noop_comment.md
            echo "cost embedded" > /tmp/cost_embedded
            exit 0
          fi

          if [[ "$SUCCESS" == "false" ]]; then
            DRAFT_PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)
            if [[ -n "$DRAFT_PR_URL" ]]; then
              # A draft PR was created — cost (with LOC/$ and Info/$) will be embedded
              # in the PR body by the "Append cost to PR" step below. Post a lightweight
              # failure notice on the issue without duplicating the cost table.
              {
                echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
                echo ""
                echo "### ⚠️ Agent could not fully resolve this issue"
                echo ""
                if [[ -n "$EXPLANATION" ]]; then
                  echo "**Agent's evaluation:**"
                  echo ""
                  echo "$EXPLANATION"
                  echo ""
                fi
                echo "A draft PR with partial work was created: $DRAFT_PR_URL"
                echo ""
                echo "The full cost breakdown (including code metrics) is in the PR body."
                echo ""
                echo "See the [workflow run logs]($RUN_URL) for full details."
              } > /tmp/failure_comment.md
              # Do NOT set cost_embedded here — let "Append cost to PR" add the full
              # cost table (with LOC/$ and Info/$) to the draft PR body instead.
            else
              {
                echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
                echo ""
                echo "### ⚠️ Agent could not fully resolve this issue"
                echo ""
                if [[ -n "$EXPLANATION" ]]; then
                  echo "**Agent's evaluation:**"
                  echo ""
                  echo "$EXPLANATION"
                  echo ""
                fi
                echo "See the [workflow run logs]($RUN_URL) for full details."
                echo ""
                echo "### 💰 Cost"
                echo ""
                echo "| Metric | Value |"
                echo "|--------|-------|"
                echo "| Time | ${ELAPSED_FMT} |"
                echo "| Iterations | ${ITERATIONS_FMT} |"
                echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
                echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
                printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
              } > /tmp/failure_comment.md
              echo "cost embedded" > /tmp/cost_embedded
            fi

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/failure_comment.md
          fi
          # Success case: success comment (with model + cost) already posted by resolve.py

      - name: Write step summary
        if: always()
        env:
          ALIAS: ${{ needs.parse.outputs.alias }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
        run: |
          if [ -f /tmp/llm_usage.json ]; then
            cost=$(python3 -c "import json; d=json.load(open('/tmp/llm_usage.json')); print(f\"\${d.get('cost',0):.2f}\")")
            iters=$(python3 -c "import json; d=json.load(open('/tmp/llm_usage.json')); print(d.get('iterations',0))")
          else
            cost="unknown"
            iters="unknown"
          fi
          if [ -f /tmp/resolve_status.json ]; then
            success=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print('✅ (no change needed)' if d.get('no_op') else ('✅' if d.get('success') else '❌'))")
            explanation=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print(d.get('explanation','')[:200])")
          else
            success="❓"
            explanation="No status recorded"
          fi
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Resolve Run Summary
          | | |
          |---|---|
          | **Result** | $success |
          | **Cost** | \$$cost |
          | **Iterations** | $iters |
          | **Model** | ${{ env.ALIAS }} (${{ env.LLM_MODEL }}) |

          **Status:** $explanation
          EOF

      - name: Assign triggerer to PR
        if: needs.parse.outputs.assign_pr == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Extract PR number from send_pull_request output
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log | head -1)
          if [ -z "$PR_URL" ]; then
            echo "Could not find PR URL in send_pull_request output, skipping assignment"
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --add-assignee "${{ github.event.comment.user.login }}"

      - name: Append cost to PR
        if: >-
          always() &&
          !(github.event.issue.pull_request || github.event.pull_request)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # For issue triggers: append the cost table to the newly created PR body.
          # Write /tmp/cost_embedded as sentinel so the fallback step skips.
          # Skipped for PR-triggered resolves — cost is posted as a comment instead.
          # (gh pr edit --body-file races with the just-pushed commits and clutters
          # the PR body with repeated cost tables on each adjustment run.)
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)
          if [ -z "$PR_URL" ]; then
            echo "No PR URL found — fallback step will handle cost reporting"
            exit 0
          fi

          # Generate cost table
          python3 << 'PYEOF'
          import json, math, os, gzip, time
          def _fmt_tok(n):
              n = int(n)
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f"{round(v)}M" if v >= 10 else f"{round(v, 1)}M"
              elif n >= 1_000:
                  v = n / 1_000
                  return f"{round(v)}K" if v >= 10 else f"{round(v, 1)}K"
              return str(n)
          def _fmt_ela(s):
              s = int(s)
              return f"{s // 60}m {s % 60}s" if s >= 60 else f"{s}s"
          def _fmt_bpd(text, cost):
              if cost <= 0: return 'N/A'
              data = text.encode('utf-8') if isinstance(text, str) else text
              bpd = (len(gzip.compress(data)) * 8) / cost  # bits per dollar
              if bpd >= 1_000_000: return f"{bpd / 1_000_000:.1f} Mbit/$"
              return f"{bpd / 1_000:.1f} Kbit/$"
          if os.path.exists("/tmp/llm_usage.json"):
              _d = json.load(open("/tmp/llm_usage.json"))
              input_tokens = _d.get('input_tokens', 0)
              output_tokens = _d.get('output_tokens', 0)
              cost = float(_d.get('cost') or 0)
              iterations = _d.get('iterations', 0)
          else:
              input_tokens = output_tokens = 0; cost = 0.0; iterations = 0
          _max_iter_str = os.environ.get("MAX_ITERATIONS", "") or ""
          _max_iter = int(_max_iter_str) if _max_iter_str.isdigit() and int(_max_iter_str) > 0 else 0
          iterations_fmt = f"{iterations} / {_max_iter}" if _max_iter > 0 else str(iterations)
          try:
              _st = int(open('/tmp/start_time').read().strip())
          except Exception:
              _st = int(time.time())
          elapsed = int(time.time()) - _st
          output_text = open("/tmp/spr_output.log").read() if os.path.exists("/tmp/spr_output.log") else ""
          import subprocess as _sp, re as _re
          # SHA written by resolve.py/setup_branch() after branching — reflects
          # the true diff base regardless of what the workflow checked out.
          _base = open('/tmp/agent_start_sha').read().strip() if os.path.exists('/tmp/agent_start_sha') else None
          _base_ref = _base or '$(git merge-base HEAD origin/main)'
          _dp = _sp.run(f'git diff {_base_ref} HEAD 2>/dev/null || echo ""', shell=True, capture_output=True, text=True)
          diff_text = _dp.stdout or ''
          _ss = _sp.run(f'git diff --shortstat {_base_ref} HEAD 2>/dev/null || echo ""', shell=True, capture_output=True, text=True)
          shortstat = _ss.stdout.strip()
          loc_changed = 0
          _m = _re.search(r"(\d+) insertion", shortstat)
          if _m: loc_changed += int(_m.group(1))
          _m = _re.search(r"(\d+) deletion", shortstat)
          if _m: loc_changed += int(_m.group(1))
          bits_text = diff_text
          rounded = math.ceil(cost * 100) / 100
          def _fmt_loc(n):
              if n >= 1_000_000: return f"{n/1_000_000:.1f}M"
              if n >= 1_000: return f"{n/1_000:.1f}k"
              return str(n)
          rows = [
              ('Time', _fmt_ela(elapsed)),
              ('Iterations', iterations_fmt),
              ('Input', _fmt_tok(input_tokens) + ' tokens'),
              ('Output', _fmt_tok(output_tokens) + ' tokens'),
              ('Diff', shortstat if shortstat else 'N/A'),
              ('LOC/$', f'{_fmt_loc(int(loc_changed / cost))} loc/$' if cost > 0 and loc_changed > 0 else 'N/A'),
              ('Info/$', _fmt_bpd(bits_text, cost)),
              ('**Cost**', f'**${rounded:.2f}**'),
          ]
          _tbl = ['---', '', '### 💰 Cost', '', '| Metric | Value |', '|--------|-------|']
          _tbl += [f'| {k} | {v} |' for k, v in rows]
          # --- Cumulative cost tracking ---
          # Fetch prior cost tables from linked issue comments and sum up costs.
          import subprocess as _sp2, re as _re2, json as _json2, os as _os2

          def _extract_costs_from_text(text):
              """Extract (cost, loc_ins, loc_del, input_tokens, output_tokens) from cost table text."""
              total_cost = 0.0
              total_ins = 0; total_del = 0
              total_in_tok = 0; total_out_tok = 0
              # Find all cost entries: **$X.XX**
              # IMPORTANT: This regex matches the bold-dollar pattern used ONLY in the per-step
              # "### 💰 Cost" table (e.g. "| **Cost** | **$0.52** |"). The "### 📊 Feature total"
              # cumulative table intentionally uses bare "$X.XX" (no ** bold markers) and the row
              # label "Cumulative cost" (not "Cost") so that future runs do NOT double-count it here.
              # Do NOT reformat the cumulative table to use **bold** values or rename the row to "Cost".
              for m in _re2.finditer(r'\*\*\$([0-9]+\.[0-9]+)\*\*', text):
                  total_cost += float(m.group(1))
              # Find LOC from Diff rows: "N insertions(+), M deletions(-)"
              for m in _re2.finditer(r'\| Diff \|[^|]*\|', text):
                  diff_cell = m.group(0)
                  ins = _re2.search(r'(\d+) insertion', diff_cell)
                  if ins: total_ins += int(ins.group(1))
                  dl = _re2.search(r'(\d+) deletion', diff_cell)
                  if dl: total_del += int(dl.group(1))
              # Find token counts from Input/Output rows
              for m in _re2.finditer(r'\| Input \| ([0-9.]+)([KM]?) tokens \|', text):
                  v = float(m.group(1))
                  sfx = m.group(2)
                  if sfx == 'K': v *= 1000
                  elif sfx == 'M': v *= 1_000_000
                  total_in_tok += int(v)
              for m in _re2.finditer(r'\| Output \| ([0-9.]+)([KM]?) tokens \|', text):
                  v = float(m.group(1))
                  sfx = m.group(2)
                  if sfx == 'K': v *= 1000
                  elif sfx == 'M': v *= 1_000_000
                  total_out_tok += int(v)
              return total_cost, total_ins, total_del, total_in_tok, total_out_tok

          # Try to get the linked issue number from the PR body (Fixes/Closes/Resolves #N)
          _repo = _os2.environ.get('GITHUB_REPOSITORY', '')
          _pr_url_file = '/tmp/spr_output.log'
          _pr_body = ''
          _linked_issue_num = None

          try:
              _pr_url_raw = ''
              if _os2.path.exists(_pr_url_file):
                  _pr_url_raw = open(_pr_url_file).read()
              _pr_url_m = _re2.search(r'https://github\.com/[^/]+/[^/]+/pull/([0-9]+)', _pr_url_raw)
              if _pr_url_m:
                  _pr_num = _pr_url_m.group(1)
                  _pr_body_r = _sp2.run(
                      ['gh', 'pr', 'view', _pr_num, '--repo', _repo, '--json', 'body', '--jq', '.body'],
                      capture_output=True, text=True
                  )
                  if _pr_body_r.returncode == 0:
                      _pr_body = _pr_body_r.stdout.strip()
              # Extract linked issue from PR body
              _fix_m = _re2.search(r'(?:Fixes|Closes|Resolves)\s+#([0-9]+)', _pr_body, _re2.IGNORECASE)
              if _fix_m:
                  _linked_issue_num = _fix_m.group(1)
          except Exception as _e2:
              pass

          # Fetch prior cost tables from linked issue comments and PR body
          _prior_costs = []
          _prior_total_cost = 0.0
          _prior_total_ins = 0; _prior_total_del = 0
          _prior_total_in_tok = 0; _prior_total_out_tok = 0
          _all_prior_text = _pr_body  # start with current PR body (prior runs appended there)

          if _linked_issue_num and _repo:
              try:
                  _comments_r = _sp2.run(
                      ['gh', 'api', f'repos/{_repo}/issues/{_linked_issue_num}/comments', '--jq', '.[].body'],
                      capture_output=True, text=True
                  )
                  if _comments_r.returncode == 0:
                      _all_prior_text += '\n' + _comments_r.stdout
                      # Also include the issue body itself
                      _issue_r = _sp2.run(
                          ['gh', 'api', f'repos/{_repo}/issues/{_linked_issue_num}', '--jq', '.body'],
                          capture_output=True, text=True
                      )
                      if _issue_r.returncode == 0:
                          _all_prior_text += '\n' + _issue_r.stdout
              except Exception:
                  pass

          # Count cost tables across all prior text (skip Feature total sections)
          _num_prior = len(_re2.findall(r'### 💰 Cost', _all_prior_text))
          if _num_prior > 0:
              _pc, _pi, _pd, _pit, _pot = _extract_costs_from_text(_all_prior_text)
              _prior_total_cost = _pc
              _prior_total_ins = _pi
              _prior_total_del = _pd
              _prior_total_in_tok = _pit
              _prior_total_out_tok = _pot
              _prior_costs = list(range(_num_prior))  # just count

          # Compute cumulative totals (prior + current step)
          _cum_steps = len(_prior_costs) + 1
          _cum_cost = _prior_total_cost + cost
          _cum_ins = _prior_total_ins + loc_changed  # loc_changed is insertions+deletions this step
          _cum_in_tok = _prior_total_in_tok + input_tokens
          _cum_out_tok = _prior_total_out_tok + output_tokens

          # Only append cumulative section if there are prior steps
          if len(_prior_costs) > 0 and _cum_cost > 0:
              def _fmt_loc_c(n):
                  if n >= 1_000_000: return f"{n/1_000_000:.1f}M"
                  if n >= 1_000: return f"{n/1_000:.1f}k"
                  return str(n)
              _cum_loc_per_dollar = int(_cum_ins / _cum_cost) if _cum_cost > 0 and _cum_ins > 0 else 0
              # FORMATTING NOTE: The cumulative table uses bare "$X.XX" (no ** bold markers)
              # and the row label "Cumulative cost" (not "Cost"). This is intentional:
              #   - _extract_costs_from_text() only picks up **$X.XX** (bold) patterns, which
              #     appear exclusively in the per-step "### 💰 Cost" table.
              #   - If you change the cost value here to **bold** or rename the row to "Cost",
              #     future runs will double-count this cumulative figure when summing prior steps.
              _ctbl = [
                  '',
                  f'### 📊 Feature total ({_cum_steps} steps)',
                  '',
                  '| Metric | Value |',
                  '|--------|-------|',
                  f'| Cumulative cost | ${_cum_cost:.2f} |',
              ]
              if _cum_ins > 0:
                  _ctbl.append(f'| LOC | ~{_fmt_loc_c(_cum_ins)} (estimate) |')
              if _cum_loc_per_dollar > 0:
                  _ctbl.append(f'| LOC/$ | ~{_fmt_loc_c(_cum_loc_per_dollar)} loc/$ |')
              if _cum_in_tok > 0:
                  _ctbl.append(f'| Input | {_fmt_tok(_cum_in_tok)} tokens |')
              if _cum_out_tok > 0:
                  _ctbl.append(f'| Output | {_fmt_tok(_cum_out_tok)} tokens |')
              _tbl += _ctbl
          open('/tmp/cost_table.txt', 'w').write('\n'.join(_tbl))
          PYEOF

          if [ ! -f /tmp/cost_table.txt ]; then
            echo "Cost table generation failed — fallback step will handle it"
            exit 0
          fi

          # Read current PR body and append cost table
          CURRENT_BODY=$(gh pr view "$PR_URL" --json body --jq '.body' 2>/dev/null || echo "")
          COST_TABLE=$(cat /tmp/cost_table.txt)
          printf '%s\n\n%s\n' "$CURRENT_BODY" "$COST_TABLE" > /tmp/pr_new_body.txt

          gh pr edit "$PR_URL" --body-file /tmp/pr_new_body.txt
          echo "cost embedded" > /tmp/cost_embedded
          echo "Cost table appended to PR $PR_URL"

      - name: Post cost comment (fallback)
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Fallback: primary paths (resolve.py success comment, Post result comment
          # failure without draft PR, Append cost to PR) already set cost_embedded.
          # This only fires for true edge cases (e.g., resolve.py crashed before
          # posting its success comment, or the Post result comment step itself failed).
          if [ -f /tmp/cost_embedded ]; then
            echo "Cost already reported — skipping fallback"
            exit 0
          fi
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          MAX_ITER="${MAX_ITERATIONS:-}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")
          {
            echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
            echo ""
            echo "⚠️ Agent did not complete — partial cost:"
            echo ""
            echo "### 💰 Cost"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Time | ${ELAPSED_FMT} |"
            echo "| Iterations | ${ITERATIONS_FMT} |"
            echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
            echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
            printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
          } > /tmp/cost_comment_fallback.md
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/cost_comment_fallback.md


  # --- Mode: build — resolve Stage 1 + council code review Stage 2 ---
  build:
    needs: parse
    if: needs.parse.outputs.mode == 'build'
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        if: vars.RDB_APP_ID != ''
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Checkout remote-dev-bot lib
        uses: actions/checkout@v5
        with:
          repository: gnovak/remote-dev-bot
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ inputs.rdb_ref }}
          path: .remote-dev-bot
          sparse-checkout: |
            /lib/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Determine API key
        id: apikey
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Select the correct API key based on the model's provider prefix.
          # Writing to GITHUB_OUTPUT passes values between steps as step outputs.
          # GitHub Actions automatically masks secret values in logs — this does
          # NOT print the key. The key is consumed by the next step as
          # ${{ steps.apikey.outputs.key }} and never appears in plaintext output.
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          # Helper: post a friendly comment when the required API key secret is missing.
          MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
          NO_API_KEY_WARNING="⚠️ **No API key configured for this model.**"
          post_no_api_key_comment() {
            local secret_name="$1"
            {
              printf '%s\n\n' "${MODEL_HEADER}"
              printf '%s\n\n' "${NO_API_KEY_WARNING}"
              printf 'The selected model \`%s\` (\`%s\`) requires an \`%s\` secret, but none was found.\n\n' "${ALIAS}" "${MODEL}" "${secret_name}"
              printf '**To fix:** Add your API key as a repository secret:\n'
              printf '\`\`\`bash\n'
              printf 'gh secret set %s --repo ${{ github.repository }}\n' "${secret_name}"
              printf '\`\`\`\n'
              printf 'Then re-trigger the bot by commenting the same command again.\n'
            } > /tmp/no_api_key_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/no_api_key_comment.md
          }

          if [[ "$MODEL" == anthropic/* ]]; then
            API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "ANTHROPIC_API_KEY"
              echo "::error::No ANTHROPIC_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == openai/* ]]; then
            API_KEY="${{ secrets.OPENAI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "OPENAI_API_KEY"
              echo "::error::No OPENAI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == gemini/* ]]; then
            API_KEY="${{ secrets.GEMINI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "GEMINI_API_KEY"
              echo "::error::No GEMINI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown model provider for: $MODEL"
            exit 1
          fi

      - name: Install dependencies
        run: pip install PyYAML litellm

      - name: Generate repo index
        run: |
          python3 .remote-dev-bot/lib/generate_index.py > /tmp/rdb-index.md
          EXTRA_FILES_RAW='${{ needs.parse.outputs.extra_files }}'
          RDB_EXTRA_FILES=$(python3 -c "import json,sys; raw=sys.argv[1]; files=json.loads(raw) if raw and raw not in ('null','') else []; files.append('/tmp/rdb-index.md'); print(json.dumps(files))" "$EXTRA_FILES_RAW")
          echo "RDB_EXTRA_FILES=$RDB_EXTRA_FILES" >> "$GITHUB_ENV"

      - name: Resolve issue
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GIT_USERNAME: ${{ github.repository_owner }}
          E2E_TEST_TOKEN: ${{ secrets.E2E_TEST_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TYPE: ${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}
          TARGET_BRANCH: ${{ needs.parse.outputs.target_branch }}
          TARGET_BRANCH_EXPLICIT: ${{ needs.parse.outputs.target_branch_explicit }}
          PR_TYPE: ${{ needs.parse.outputs.pr_type }}
          ON_FAILURE: ${{ needs.parse.outputs.on_failure }}
          MAX_ITERATIONS: ${{ needs.parse.outputs.max_iterations }}
          WRAPUP_ENABLED: ${{ needs.parse.outputs.graceful_wrapup_enabled }}
          WRAPUP_ITERATION: ${{ needs.parse.outputs.graceful_wrapup_iteration }}
          STATUS_LOG_INTERVAL: ${{ needs.parse.outputs.status_log_interval }}
          ALIAS: ${{ needs.parse.outputs.alias }}
          EXTRA_FILES: ${{ env.RDB_EXTRA_FILES }}
          EXTRA_INSTRUCTIONS: ${{ needs.parse.outputs.extra_instructions }}
          MODEL_EXTRA_INSTRUCTIONS: ${{ needs.parse.outputs.model_extra_instructions }}
          DEBUG_LOGGING: ${{ needs.parse.outputs.debug_logging }}
          DISTILL_ENABLED: ${{ needs.parse.outputs.distill_enabled }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          ISSUE_TYPE="${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}"
          TARGET_BRANCH_EXPLICIT="${{ needs.parse.outputs.target_branch_explicit }}"

          # For PR triggers: if no explicit branch was set, use the PR's own base branch.
          # For issue triggers: use the configured target_branch.
          if [[ "$ISSUE_TYPE" == "pr" && "$TARGET_BRANCH_EXPLICIT" != "true" ]]; then
            TARGET_BRANCH=$(gh pr view "$ISSUE_NUMBER" --json baseRefName --jq '.baseRefName')
            export TARGET_BRANCH
          fi

          TIMEOUT_MINUTES="${{ needs.parse.outputs.timeout_minutes }}"
          TIMEOUT_SECONDS=$((TIMEOUT_MINUTES * 60))
          echo "Resolver timeout: ${TIMEOUT_MINUTES} minutes"
          echo $(date +%s) > /tmp/start_time
          # Run agent loop under timeout. On expiry: SIGTERM first, then SIGKILL after 60s.
          # Subsequent cleanup steps run regardless via if:always().
          # /tmp/agent_start_sha is written by resolve.py/setup_branch() after
          # branching from TARGET_BRANCH — gives correct diff base even when
          # the workflow checkout lands on a different branch (e.g. main).
          timeout --kill-after=60 "$TIMEOUT_SECONDS" \
            python3 -u .remote-dev-bot/lib/resolve.py
          RESOLVE_EXIT_CODE=$?

          if [[ $RESOLVE_EXIT_CODE -eq 124 ]]; then
            echo "::warning::Resolver timed out after ${TIMEOUT_MINUTES} minutes. Cleanup steps will still run."
          fi

          exit $RESOLVE_EXIT_CODE

      - name: Safety-net push
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # If the agent made commits but forgot to push, or exhausted iterations without
          # calling finish(), save the work now. Skipped for no_op runs (nothing to push).
          NO_OP=$(python3 -c "import json,os; d=json.load(open('/tmp/resolve_status.json')) if os.path.exists('/tmp/resolve_status.json') else {}; print('true' if d.get('no_op') else 'false')" 2>/dev/null || echo "false")
          if [[ "$NO_OP" == "true" ]]; then
            echo "no_op run — skipping safety-net push"
            exit 0
          fi
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "WIP: auto-saved by workflow (agent did not commit before exiting)"
            echo "Committed uncommitted changes"
          fi
          git push origin HEAD 2>/dev/null || echo "Push failed or nothing to push"

      - name: Post result comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          ON_FAILURE="${{ needs.parse.outputs.on_failure }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          MODEL="${{ needs.parse.outputs.model }}"

          # Compute cost for inclusion in the result comment
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          MAX_ITER="${MAX_ITERATIONS:-}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")

          # Read resolve status written by resolve.py
          if [[ ! -f /tmp/resolve_status.json ]]; then
            # resolve.py crashed before writing status (OOM, import error, etc.)
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ⚠️ Agent process exited unexpectedly"
              echo ""
              echo "The agent process exited unexpectedly — see run logs for details."
              echo ""
              echo "See the [workflow run logs]($RUN_URL) for full details."
              echo ""
              echo "### 💰 Cost"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Time | ${ELAPSED_FMT} |"
              echo "| Iterations | ${ITERATIONS_FMT} |"
              echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
              echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
              printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
            } > /tmp/failure_comment.md

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/failure_comment.md
            echo "cost embedded" > /tmp/cost_embedded
            exit 0
          fi

          SUCCESS=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print('true' if d.get('success') else 'false')")
          NO_OP=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print('true' if d.get('no_op') else 'false')")
          EXPLANATION=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print(d.get('explanation',''))")

          if [[ "$NO_OP" == "true" ]]; then
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ℹ️ No change needed"
              echo ""
              echo "The agent investigated this issue and determined that no code change is required."
              echo ""
              if [[ -n "$EXPLANATION" ]]; then
                echo "**Agent's findings:**"
                echo ""
                echo "$EXPLANATION"
                echo ""
              fi
              echo "### 💰 Cost"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Time | ${ELAPSED_FMT} |"
              echo "| Iterations | ${ITERATIONS_FMT} |"
              echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
              echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
              printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
            } > /tmp/noop_comment.md

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/noop_comment.md
            echo "cost embedded" > /tmp/cost_embedded
            exit 0
          fi

          if [[ "$SUCCESS" == "false" ]]; then
            DRAFT_PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)
            if [[ -n "$DRAFT_PR_URL" ]]; then
              # A draft PR was created — cost (with LOC/$ and Info/$) will be embedded
              # in the PR body by the "Append cost to PR" step below. Post a lightweight
              # failure notice on the issue without duplicating the cost table.
              {
                echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
                echo ""
                echo "### ⚠️ Agent could not fully resolve this issue"
                echo ""
                if [[ -n "$EXPLANATION" ]]; then
                  echo "**Agent's evaluation:**"
                  echo ""
                  echo "$EXPLANATION"
                  echo ""
                fi
                echo "A draft PR with partial work was created: $DRAFT_PR_URL"
                echo ""
                echo "The full cost breakdown (including code metrics) is in the PR body."
                echo ""
                echo "See the [workflow run logs]($RUN_URL) for full details."
              } > /tmp/failure_comment.md
              # Do NOT set cost_embedded here — let "Append cost to PR" add the full
              # cost table (with LOC/$ and Info/$) to the draft PR body instead.
            else
              {
                echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
                echo ""
                echo "### ⚠️ Agent could not fully resolve this issue"
                echo ""
                if [[ -n "$EXPLANATION" ]]; then
                  echo "**Agent's evaluation:**"
                  echo ""
                  echo "$EXPLANATION"
                  echo ""
                fi
                echo "See the [workflow run logs]($RUN_URL) for full details."
                echo ""
                echo "### 💰 Cost"
                echo ""
                echo "| Metric | Value |"
                echo "|--------|-------|"
                echo "| Time | ${ELAPSED_FMT} |"
                echo "| Iterations | ${ITERATIONS_FMT} |"
                echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
                echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
                printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
              } > /tmp/failure_comment.md
              echo "cost embedded" > /tmp/cost_embedded
            fi

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/failure_comment.md
          fi
          # Success case: success comment (with model + cost) already posted by resolve.py

      - name: Run council code review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          COUNCIL_MODELS: ${{ needs.parse.outputs.council_models }}
          GITHUB_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Read the PR URL written by resolve.py
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)

          if [[ -z "$PR_URL" ]]; then
            # Check if this was an intentional no-op — if so, skip silently
            NO_OP=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')) if __import__('os').path.exists('/tmp/resolve_status.json') else {}; print('true' if d.get('no_op') else 'false')")
            if [[ "$NO_OP" == "true" ]]; then
              echo "Agent signaled no_op — no PR to review. Skipping council review."
              exit 0
            fi
            echo "No PR URL found — resolve may have failed. Posting notice and skipping council review."
            gh issue comment "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPO" \
              --body "## 🏛️ Build Stage 2 — Council Code Review

          ⚠️ **Skipped** — the implementation stage did not produce a pull request. Council code review requires a PR to review. See the [workflow run logs]($RUN_URL) for details."
            exit 0
          fi

          export PR_URL
          python3 << 'PYEOF'
          import json
          import os
          import re
          import subprocess
          import sys

          sys.path.insert(0, ".remote-dev-bot/lib")
          from workshop import run_build_council

          github_repo = os.environ["GITHUB_REPO"]
          github_token = os.environ["GH_TOKEN"]
          pr_url = os.environ.get("PR_URL", "")
          issue_number = os.environ["ISSUE_NUMBER"]

          pr_number_match = re.search(r'/pull/(\d+)$', pr_url)
          if not pr_number_match:
              print("No PR number found in URL, exiting")
              sys.exit(0)
          pr_number = pr_number_match.group(1)

          env = {**os.environ, "GH_TOKEN": github_token}

          # Fetch PR details
          pr_json = subprocess.run(
              ["gh", "api", f"repos/{github_repo}/pulls/{pr_number}"],
              capture_output=True, text=True, env=env,
          ).stdout
          pr_data = json.loads(pr_json)
          pr_title = pr_data.get("title", "")
          pr_body = pr_data.get("body", "") or ""

          # Fetch PR diff (truncate very large diffs to avoid token blowout)
          diff_result = subprocess.run(
              ["gh", "api", f"repos/{github_repo}/pulls/{pr_number}",
               "--header", "Accept: application/vnd.github.diff"],
              capture_output=True, text=True, env=env,
          )
          pr_diff = diff_result.stdout[:40000]

          # Fetch issue title + body
          issue_json = subprocess.run(
              ["gh", "api", f"repos/{github_repo}/issues/{issue_number}"],
              capture_output=True, text=True, env=env,
          ).stdout
          issue_data = json.loads(issue_json)
          issue_title = issue_data.get("title", "")
          issue_body_text = issue_data.get("body", "") or ""

          council_models = json.loads(os.environ.get("COUNCIL_MODELS", "[]") or "[]")
          # Mode-level extra_instructions for council reviewers (each model adds its own model-level)
          council_extra_instructions = "${{ needs.parse.outputs.extra_instructions }}"

          def post_pr_comment(body):
              proc = subprocess.run(
                  ["gh", "pr", "comment", pr_number,
                   "--repo", github_repo,
                   "--body", body],
                  env=env,
                  capture_output=True, text=True,
              )
              if proc.returncode != 0:
                  print(f"Warning: failed to post PR comment: {proc.stderr}", file=sys.stderr)

          build_result = run_build_council(
              council_models=council_models,
              issue_title=issue_title,
              issue_body=issue_body_text,
              pr_title=pr_title,
              pr_body=pr_body,
              pr_diff=pr_diff,
              extra_instructions=council_extra_instructions,
              post_comment_fn=post_pr_comment,
          )

          # Merge council usage into resolve.py's existing usage data
          existing = {}
          if os.path.exists("/tmp/llm_usage.json"):
              with open("/tmp/llm_usage.json") as f:
                  existing = json.load(f)

          combined = {
              "input_tokens": existing.get("input_tokens", 0) + build_result["total_input_tokens"],
              "output_tokens": existing.get("output_tokens", 0) + build_result["total_output_tokens"],
              "cost": (existing.get("cost") or 0.0) + build_result["total_cost"],
              "iterations": existing.get("iterations", 0),
          }
          with open("/tmp/llm_usage.json", "w") as f:
              json.dump(combined, f)
          PYEOF

      - name: Write step summary
        if: always()
        env:
          ALIAS: ${{ needs.parse.outputs.alias }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
        run: |
          if [ -f /tmp/llm_usage.json ]; then
            cost=$(python3 -c "import json; d=json.load(open('/tmp/llm_usage.json')); print(f\"\${d.get('cost',0):.2f}\")")
            iters=$(python3 -c "import json; d=json.load(open('/tmp/llm_usage.json')); print(d.get('iterations',0))")
          else
            cost="unknown"
            iters="unknown"
          fi
          if [ -f /tmp/resolve_status.json ]; then
            success=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print('✅ (no change needed)' if d.get('no_op') else ('✅' if d.get('success') else '❌'))")
            explanation=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print(d.get('explanation','')[:200])")
          else
            success="❓"
            explanation="No status recorded"
          fi
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Resolve Run Summary
          | | |
          |---|---|
          | **Result** | $success |
          | **Cost** | \$$cost |
          | **Iterations** | $iters |
          | **Model** | ${{ env.ALIAS }} (${{ env.LLM_MODEL }}) |

          **Status:** $explanation
          EOF

      - name: Assign triggerer to PR
        if: needs.parse.outputs.assign_pr == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Extract PR number from send_pull_request output
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log | head -1)
          if [ -z "$PR_URL" ]; then
            echo "Could not find PR URL in send_pull_request output, skipping assignment"
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --add-assignee "${{ github.event.comment.user.login }}"

      - name: Append cost to PR
        if: >-
          always() &&
          !(github.event.issue.pull_request || github.event.pull_request)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # For issue triggers: append the cost table to the newly created PR body.
          # Write /tmp/cost_embedded as sentinel so the fallback step skips.
          # Skipped for PR-triggered resolves — cost is posted as a comment instead.
          # (gh pr edit --body-file races with the just-pushed commits and clutters
          # the PR body with repeated cost tables on each adjustment run.)
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)
          if [ -z "$PR_URL" ]; then
            echo "No PR URL found — fallback step will handle cost reporting"
            exit 0
          fi

          # Generate cost table
          python3 << 'PYEOF'
          import json, math, os, gzip, time
          def _fmt_tok(n):
              n = int(n)
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f"{round(v)}M" if v >= 10 else f"{round(v, 1)}M"
              elif n >= 1_000:
                  v = n / 1_000
                  return f"{round(v)}K" if v >= 10 else f"{round(v, 1)}K"
              return str(n)
          def _fmt_ela(s):
              s = int(s)
              return f"{s // 60}m {s % 60}s" if s >= 60 else f"{s}s"
          def _fmt_bpd(text, cost):
              if cost <= 0: return 'N/A'
              data = text.encode('utf-8') if isinstance(text, str) else text
              bpd = (len(gzip.compress(data)) * 8) / cost  # bits per dollar
              if bpd >= 1_000_000: return f"{bpd / 1_000_000:.1f} Mbit/$"
              return f"{bpd / 1_000:.1f} Kbit/$"
          if os.path.exists("/tmp/llm_usage.json"):
              _d = json.load(open("/tmp/llm_usage.json"))
              input_tokens = _d.get('input_tokens', 0)
              output_tokens = _d.get('output_tokens', 0)
              cost = float(_d.get('cost') or 0)
              iterations = _d.get('iterations', 0)
          else:
              input_tokens = output_tokens = 0; cost = 0.0; iterations = 0
          _max_iter_str = os.environ.get("MAX_ITERATIONS", "") or ""
          _max_iter = int(_max_iter_str) if _max_iter_str.isdigit() and int(_max_iter_str) > 0 else 0
          iterations_fmt = f"{iterations} / {_max_iter}" if _max_iter > 0 else str(iterations)
          try:
              _st = int(open('/tmp/start_time').read().strip())
          except Exception:
              _st = int(time.time())
          elapsed = int(time.time()) - _st
          output_text = open("/tmp/spr_output.log").read() if os.path.exists("/tmp/spr_output.log") else ""
          import subprocess as _sp, re as _re
          # SHA written by resolve.py/setup_branch() after branching — reflects
          # the true diff base regardless of what the workflow checked out.
          _base = open('/tmp/agent_start_sha').read().strip() if os.path.exists('/tmp/agent_start_sha') else None
          _base_ref = _base or '$(git merge-base HEAD origin/main)'
          _dp = _sp.run(f'git diff {_base_ref} HEAD 2>/dev/null || echo ""', shell=True, capture_output=True, text=True)
          diff_text = _dp.stdout or ''
          _ss = _sp.run(f'git diff --shortstat {_base_ref} HEAD 2>/dev/null || echo ""', shell=True, capture_output=True, text=True)
          shortstat = _ss.stdout.strip()
          loc_changed = 0
          _m = _re.search(r"(\d+) insertion", shortstat)
          if _m: loc_changed += int(_m.group(1))
          _m = _re.search(r"(\d+) deletion", shortstat)
          if _m: loc_changed += int(_m.group(1))
          bits_text = diff_text
          rounded = math.ceil(cost * 100) / 100
          def _fmt_loc(n):
              if n >= 1_000_000: return f"{n/1_000_000:.1f}M"
              if n >= 1_000: return f"{n/1_000:.1f}k"
              return str(n)
          rows = [
              ('Time', _fmt_ela(elapsed)),
              ('Iterations', iterations_fmt),
              ('Input', _fmt_tok(input_tokens) + ' tokens'),
              ('Output', _fmt_tok(output_tokens) + ' tokens'),
              ('Diff', shortstat if shortstat else 'N/A'),
              ('LOC/$', f'{_fmt_loc(int(loc_changed / cost))} loc/$' if cost > 0 and loc_changed > 0 else 'N/A'),
              ('Info/$', _fmt_bpd(bits_text, cost)),
              ('**Cost**', f'**${rounded:.2f}**'),
          ]
          _tbl = ['---', '', '### 💰 Cost', '', '| Metric | Value |', '|--------|-------|']
          _tbl += [f'| {k} | {v} |' for k, v in rows]
          # --- Cumulative cost tracking ---
          # Fetch prior cost tables from linked issue comments and sum up costs.
          import subprocess as _sp2, re as _re2, json as _json2, os as _os2

          def _extract_costs_from_text(text):
              """Extract (cost, loc_ins, loc_del, input_tokens, output_tokens) from cost table text."""
              total_cost = 0.0
              total_ins = 0; total_del = 0
              total_in_tok = 0; total_out_tok = 0
              # Find all cost entries: **$X.XX**
              # IMPORTANT: This regex matches the bold-dollar pattern used ONLY in the per-step
              # "### 💰 Cost" table (e.g. "| **Cost** | **$0.52** |"). The "### 📊 Feature total"
              # cumulative table intentionally uses bare "$X.XX" (no ** bold markers) and the row
              # label "Cumulative cost" (not "Cost") so that future runs do NOT double-count it here.
              # Do NOT reformat the cumulative table to use **bold** values or rename the row to "Cost".
              for m in _re2.finditer(r'\*\*\$([0-9]+\.[0-9]+)\*\*', text):
                  total_cost += float(m.group(1))
              # Find LOC from Diff rows: "N insertions(+), M deletions(-)"
              for m in _re2.finditer(r'\| Diff \|[^|]*\|', text):
                  diff_cell = m.group(0)
                  ins = _re2.search(r'(\d+) insertion', diff_cell)
                  if ins: total_ins += int(ins.group(1))
                  dl = _re2.search(r'(\d+) deletion', diff_cell)
                  if dl: total_del += int(dl.group(1))
              # Find token counts from Input/Output rows
              for m in _re2.finditer(r'\| Input \| ([0-9.]+)([KM]?) tokens \|', text):
                  v = float(m.group(1))
                  sfx = m.group(2)
                  if sfx == 'K': v *= 1000
                  elif sfx == 'M': v *= 1_000_000
                  total_in_tok += int(v)
              for m in _re2.finditer(r'\| Output \| ([0-9.]+)([KM]?) tokens \|', text):
                  v = float(m.group(1))
                  sfx = m.group(2)
                  if sfx == 'K': v *= 1000
                  elif sfx == 'M': v *= 1_000_000
                  total_out_tok += int(v)
              return total_cost, total_ins, total_del, total_in_tok, total_out_tok

          # Try to get the linked issue number from the PR body (Fixes/Closes/Resolves #N)
          _repo = _os2.environ.get('GITHUB_REPOSITORY', '')
          _pr_url_file = '/tmp/spr_output.log'
          _pr_body = ''
          _linked_issue_num = None

          try:
              _pr_url_raw = ''
              if _os2.path.exists(_pr_url_file):
                  _pr_url_raw = open(_pr_url_file).read()
              _pr_url_m = _re2.search(r'https://github\.com/[^/]+/[^/]+/pull/([0-9]+)', _pr_url_raw)
              if _pr_url_m:
                  _pr_num = _pr_url_m.group(1)
                  _pr_body_r = _sp2.run(
                      ['gh', 'pr', 'view', _pr_num, '--repo', _repo, '--json', 'body', '--jq', '.body'],
                      capture_output=True, text=True
                  )
                  if _pr_body_r.returncode == 0:
                      _pr_body = _pr_body_r.stdout.strip()
              # Extract linked issue from PR body
              _fix_m = _re2.search(r'(?:Fixes|Closes|Resolves)\s+#([0-9]+)', _pr_body, _re2.IGNORECASE)
              if _fix_m:
                  _linked_issue_num = _fix_m.group(1)
          except Exception as _e2:
              pass

          # Fetch prior cost tables from linked issue comments and PR body
          _prior_costs = []
          _prior_total_cost = 0.0
          _prior_total_ins = 0; _prior_total_del = 0
          _prior_total_in_tok = 0; _prior_total_out_tok = 0
          _all_prior_text = _pr_body  # start with current PR body (prior runs appended there)

          if _linked_issue_num and _repo:
              try:
                  _comments_r = _sp2.run(
                      ['gh', 'api', f'repos/{_repo}/issues/{_linked_issue_num}/comments', '--jq', '.[].body'],
                      capture_output=True, text=True
                  )
                  if _comments_r.returncode == 0:
                      _all_prior_text += '\n' + _comments_r.stdout
                      # Also include the issue body itself
                      _issue_r = _sp2.run(
                          ['gh', 'api', f'repos/{_repo}/issues/{_linked_issue_num}', '--jq', '.body'],
                          capture_output=True, text=True
                      )
                      if _issue_r.returncode == 0:
                          _all_prior_text += '\n' + _issue_r.stdout
              except Exception:
                  pass

          # Count cost tables across all prior text (skip Feature total sections)
          _num_prior = len(_re2.findall(r'### 💰 Cost', _all_prior_text))
          if _num_prior > 0:
              _pc, _pi, _pd, _pit, _pot = _extract_costs_from_text(_all_prior_text)
              _prior_total_cost = _pc
              _prior_total_ins = _pi
              _prior_total_del = _pd
              _prior_total_in_tok = _pit
              _prior_total_out_tok = _pot
              _prior_costs = list(range(_num_prior))  # just count

          # Compute cumulative totals (prior + current step)
          _cum_steps = len(_prior_costs) + 1
          _cum_cost = _prior_total_cost + cost
          _cum_ins = _prior_total_ins + loc_changed  # loc_changed is insertions+deletions this step
          _cum_in_tok = _prior_total_in_tok + input_tokens
          _cum_out_tok = _prior_total_out_tok + output_tokens

          # Only append cumulative section if there are prior steps
          if len(_prior_costs) > 0 and _cum_cost > 0:
              def _fmt_loc_c(n):
                  if n >= 1_000_000: return f"{n/1_000_000:.1f}M"
                  if n >= 1_000: return f"{n/1_000:.1f}k"
                  return str(n)
              _cum_loc_per_dollar = int(_cum_ins / _cum_cost) if _cum_cost > 0 and _cum_ins > 0 else 0
              # FORMATTING NOTE: The cumulative table uses bare "$X.XX" (no ** bold markers)
              # and the row label "Cumulative cost" (not "Cost"). This is intentional:
              #   - _extract_costs_from_text() only picks up **$X.XX** (bold) patterns, which
              #     appear exclusively in the per-step "### 💰 Cost" table.
              #   - If you change the cost value here to **bold** or rename the row to "Cost",
              #     future runs will double-count this cumulative figure when summing prior steps.
              _ctbl = [
                  '',
                  f'### 📊 Feature total ({_cum_steps} steps)',
                  '',
                  '| Metric | Value |',
                  '|--------|-------|',
                  f'| Cumulative cost | ${_cum_cost:.2f} |',
              ]
              if _cum_ins > 0:
                  _ctbl.append(f'| LOC | ~{_fmt_loc_c(_cum_ins)} (estimate) |')
              if _cum_loc_per_dollar > 0:
                  _ctbl.append(f'| LOC/$ | ~{_fmt_loc_c(_cum_loc_per_dollar)} loc/$ |')
              if _cum_in_tok > 0:
                  _ctbl.append(f'| Input | {_fmt_tok(_cum_in_tok)} tokens |')
              if _cum_out_tok > 0:
                  _ctbl.append(f'| Output | {_fmt_tok(_cum_out_tok)} tokens |')
              _tbl += _ctbl
          open('/tmp/cost_table.txt', 'w').write('\n'.join(_tbl))
          PYEOF

          if [ ! -f /tmp/cost_table.txt ]; then
            echo "Cost table generation failed — fallback step will handle it"
            exit 0
          fi

          # Read current PR body and append cost table
          CURRENT_BODY=$(gh pr view "$PR_URL" --json body --jq '.body' 2>/dev/null || echo "")
          COST_TABLE=$(cat /tmp/cost_table.txt)
          printf '%s\n\n%s\n' "$CURRENT_BODY" "$COST_TABLE" > /tmp/pr_new_body.txt

          gh pr edit "$PR_URL" --body-file /tmp/pr_new_body.txt
          echo "cost embedded" > /tmp/cost_embedded
          echo "Cost table appended to PR $PR_URL"

      - name: Post cost comment (fallback)
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Fallback: primary paths (resolve.py success comment, Post result comment
          # failure without draft PR, Append cost to PR) already set cost_embedded.
          # This only fires for true edge cases (e.g., resolve.py crashed before
          # posting its success comment, or the Post result comment step itself failed).
          if [ -f /tmp/cost_embedded ]; then
            echo "Cost already reported — skipping fallback"
            exit 0
          fi
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          MAX_ITER="${MAX_ITERATIONS:-}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")
          {
            echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
            echo ""
            echo "⚠️ Agent did not complete — partial cost:"
            echo ""
            echo "### 💰 Cost"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Time | ${ELAPSED_FMT} |"
            echo "| Iterations | ${ITERATIONS_FMT} |"
            echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
            echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
            printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
          } > /tmp/cost_comment_fallback.md
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/cost_comment_fallback.md

  # --- Mode: review — lightweight agentic loop to review a PR ---
  review:
    needs: parse
    if: needs.parse.outputs.mode == 'review'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate app token
        if: vars.RDB_APP_ID != ''
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Checkout remote-dev-bot config
        uses: actions/checkout@v5
        with:
          repository: gnovak/remote-dev-bot
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ inputs.rdb_ref }}
          path: .remote-dev-bot
          sparse-checkout: |
            /remote-dev-bot.yaml
            /lib/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyYAML litellm

      - name: Generate repo index
        run: |
          python3 .remote-dev-bot/lib/generate_index.py > /tmp/rdb-index.md
          EXTRA_FILES_RAW='${{ needs.parse.outputs.extra_files }}'
          RDB_EXTRA_FILES=$(python3 -c "import json,sys; raw=sys.argv[1]; files=json.loads(raw) if raw and raw not in ('null','') else []; files.append('/tmp/rdb-index.md'); print(json.dumps(files))" "$EXTRA_FILES_RAW")
          echo "RDB_EXTRA_FILES=$RDB_EXTRA_FILES" >> "$GITHUB_ENV"

      - name: Determine API key
        id: apikey
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Select the correct API key based on the model's provider prefix.
          # Writing to GITHUB_OUTPUT passes values between steps as step outputs.
          # GitHub Actions automatically masks secret values in logs — this does
          # NOT print the key. The key is consumed by the next step as
          # ${{ steps.apikey.outputs.key }} and never appears in plaintext output.
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          # Helper: post a friendly comment when the required API key secret is missing.
          MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
          NO_API_KEY_WARNING="⚠️ **No API key configured for this model.**"
          post_no_api_key_comment() {
            local secret_name="$1"
            {
              printf '%s\n\n' "${MODEL_HEADER}"
              printf '%s\n\n' "${NO_API_KEY_WARNING}"
              printf 'The selected model \`%s\` (\`%s\`) requires an \`%s\` secret, but none was found.\n\n' "${ALIAS}" "${MODEL}" "${secret_name}"
              printf '**To fix:** Add your API key as a repository secret:\n'
              printf '\`\`\`bash\n'
              printf 'gh secret set %s --repo ${{ github.repository }}\n' "${secret_name}"
              printf '\`\`\`\n'
              printf 'Then re-trigger the bot by commenting the same command again.\n'
            } > /tmp/no_api_key_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/no_api_key_comment.md
          }

          if [[ "$MODEL" == anthropic/* ]]; then
            API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "ANTHROPIC_API_KEY"
              echo "::error::No ANTHROPIC_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == openai/* ]]; then
            API_KEY="${{ secrets.OPENAI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "OPENAI_API_KEY"
              echo "::error::No OPENAI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == gemini/* ]]; then
            API_KEY="${{ secrets.GEMINI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "GEMINI_API_KEY"
              echo "::error::No GEMINI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown model provider for: $MODEL"
            exit 1
          fi

      - name: Gather PR context
        id: context
        run: |
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}

          # Verify this is a PR (review mode only makes sense on PRs)
          IS_PR=${{ (github.event.issue.pull_request || github.event.pull_request) && 'true' || 'false' }}
          if [[ "$IS_PR" != "true" ]]; then
            ALIAS="${{ needs.parse.outputs.alias }}"
            MODEL="${{ needs.parse.outputs.model }}"
            MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
            REVIEW_NOT_PR_WARNING="⚠️ \`/agent-review\` only works on pull requests, not issues."
            printf '%s\n\n%s\n' "${MODEL_HEADER}" "${REVIEW_NOT_PR_WARNING}" > /tmp/review_not_pr.md
            gh issue comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/review_not_pr.md
            exit 1
          fi

          # Checkout the PR head branch so reviewer sees current state of changed files
          gh pr checkout "$PR_NUMBER" --repo "${{ github.repository }}"

          # Fetch PR metadata
          PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER})
          PR_TITLE=$(echo "$PR_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          PR_BODY=$(echo "$PR_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body','') or '')")
          PR_HEAD=$(echo "$PR_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['head']['ref'])")
          PR_BASE=$(echo "$PR_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['base']['ref'])")

          # Get PR diff
          gh pr diff "$PR_NUMBER" --repo "${{ github.repository }}" > /tmp/pr_diff.txt 2>/dev/null || echo "(diff unavailable)" > /tmp/pr_diff.txt

          # Fetch PR comments (issue-style + timeline)
          COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments?per_page=100")
          COMMENTS=$(echo "$COMMENTS_JSON" | python3 -c "
          import sys, json
          comments = json.load(sys.stdin)
          for c in comments:
              user = c['user']['login']
              body = c.get('body','')
              print(f'--- @{user} ---')
              print(body)
              print()
          ")

          # Write to files to avoid shell escaping issues
          echo "$PR_TITLE" > /tmp/pr_title.txt
          echo "$PR_BODY" > /tmp/pr_body.txt
          printf '%s -> %s' "$PR_HEAD" "$PR_BASE" > /tmp/pr_branches.txt
          echo "$COMMENTS" > /tmp/pr_comments.txt

          # Fetch linked issue if referenced in PR body (Closes/Fixes/Resolves #N)
          LINKED_ISSUE_NUM=$(echo "$PR_BODY" | python3 -c "
          import sys, re
          body = sys.stdin.read()
          m = re.search(r'(?:Closes|Fixes|Resolves)\s+#(\d+)', body, re.IGNORECASE)
          if m:
              print(m.group(1))
          " 2>/dev/null || true)
          if [[ -n "$LINKED_ISSUE_NUM" ]]; then
            ISSUE_JSON=$(gh api "repos/${{ github.repository }}/issues/${LINKED_ISSUE_NUM}" 2>/dev/null || echo "")
            if [[ -n "$ISSUE_JSON" ]]; then
              echo "$ISSUE_JSON" | python3 -c "
          import sys, json
          issue = json.load(sys.stdin)
          print(f'Issue #{issue[\"number\"]}: {issue[\"title\"]}')
          print()
          print(issue.get('body', '') or '')
              " > /tmp/linked_issue.txt
            fi
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Run review loop
        id: review
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EXTRA_FILES: ${{ env.RDB_EXTRA_FILES }}
          REVIEW_MAX_ITERATIONS: ${{ needs.parse.outputs.review_max_iterations }}
          REVIEW_CONTEXT_KEEP_TOOL_RESULTS: ${{ needs.parse.outputs.review_context_keep_tool_results }}
          REVIEW_WRAPUP_ENABLED: ${{ needs.parse.outputs.graceful_wrapup_enabled }}
          REVIEW_WRAPUP_ITERATION: ${{ needs.parse.outputs.graceful_wrapup_iteration }}
        run: |
          date +%s > /tmp/start_time
          python3 << 'PYEOF'
          import json
          import os
          import subprocess
          import sys

          sys.path.insert(0, ".remote-dev-bot/lib")
          from context import trim_tool_results
          from litellm import completion

          model = "${{ needs.parse.outputs.model }}"

          # Load extra_instructions from parse outputs (mode-level + model-level combined)
          extra_instructions = "\n\n".join(p for p in [
              "${{ needs.parse.outputs.extra_instructions }}",
              "${{ needs.parse.outputs.model_extra_instructions }}",
          ] if p)

          # Get max iterations from config (default 10)
          max_iterations = int(os.environ.get("REVIEW_MAX_ITERATIONS", "10") or "10")

          # Graceful wrapup settings
          wrapup_enabled = os.environ.get("REVIEW_WRAPUP_ENABLED", "true").lower() == "true"
          wrapup_iteration = int(os.environ.get("REVIEW_WRAPUP_ITERATION", "0") or "0")

          # Context trimming
          context_keep_tool_results = int(os.environ.get("REVIEW_CONTEXT_KEEP_TOOL_RESULTS", "0") or "0")

          # Generate repository file listing (tracked files only — PR head branch)
          result = subprocess.run(
              ["git", "ls-files"],
              capture_output=True, text=True
          )
          file_listing = result.stdout.strip()
          repo_context = f"## Repository File Listing\n\n```\n{file_listing}\n```"

          # Read repo context files (missing files are skipped gracefully)
          context_files = json.loads(os.environ.get("EXTRA_FILES", "[]") or "[]")
          for filepath in context_files:
              if os.path.exists(filepath):
                  with open(filepath) as f:
                      content = f.read().strip()
                  if content:
                      repo_context += f"\n\n## File: {filepath}\n\n{content}"

          # Read PR context
          with open("/tmp/pr_title.txt") as f:
              title = f.read().strip()
          with open("/tmp/pr_body.txt") as f:
              body = f.read().strip()
          with open("/tmp/pr_branches.txt") as f:
              branches = f.read().strip()
          with open("/tmp/pr_diff.txt") as f:
              diff = f.read().strip()
          with open("/tmp/pr_comments.txt") as f:
              comments = f.read().strip()

          # Read linked issue if available
          linked_issue = ""
          if os.path.exists("/tmp/linked_issue.txt"):
              with open("/tmp/linked_issue.txt") as f:
                  linked_issue = f.read().strip()

          # Limit diff size to avoid token explosion
          if len(diff) > 100000:
              diff = diff[:100000] + "\n\n... (diff truncated, showing first 100000 characters)"

          # Build the user content
          user_content = f"""## Pull Request: {title}

          **Branches:** {branches}

          {body}

          ## PR Diff:

          ```diff
          {diff}
          ```
          """

          if linked_issue:
              user_content += f"\n## Linked Issue:\n\n{linked_issue}\n"

          user_content += f"\n## Discussion so far:\n{comments}\n"

          system_prompt = (
              "You are reviewing a GitHub pull request. "
              "You have access to tools to read files and search the codebase for context. "
              "The PR diff is provided above — use tools to explore surrounding code, "
              "understand context, check tests, and verify conventions. "
              "When you have enough information, call submit_review with your complete review. "
              "\n\nFirst, **check the PR discussion** (provided above) for any comments "
              "specifying what kind of review is wanted, what to focus on, or particular "
              "concerns to address. If the discussion includes such instructions, follow them. "
              "\n\nIf no specific instructions are given, default to asking: "
              "**Is this the right approach?** Focus on design soundness — whether the "
              "solution addresses the real problem, whether there are simpler or better "
              "alternatives, and whether the trade-offs are well-considered. Also cover:\n"
              "- **Correctness**: Bugs, logic errors, unhandled edge cases\n"
              "- **Tests**: Adequate test coverage, edge cases covered\n"
              "- **Style**: Project conventions (check AGENTS.md if present)\n"
              "- **Security**: Any security concerns\n"
          )

          if linked_issue:
              system_prompt += (
                  "\n\nA linked issue has been provided above. "
                  "Assess whether the PR adequately addresses what the issue asked for.\n"
              )

          system_prompt += (
              "\n\nCRITICAL: Do NOT modify any files. Do NOT make git commits. "
              "Do NOT begin your response with a slash command like /agent. "
              "Your only output is the review submitted via submit_review."
              "\n\nLength and tone: your review will be posted as a GitHub comment "
              "and may be read by a subsequent resolve agent as part of its task context. "
              "Say what needs to be said — don't pad, don't repeat the PR description back, "
              "don't add caveats for their own sake. "
              "Cover what matters most; skip minor nits unless they are pervasive. "
              "Do not truncate or trail off mid-sentence."
          )

          if extra_instructions:
              system_prompt += "\n\n" + extra_instructions

          if repo_context:
              system_prompt = "# Repository Context\n" + repo_context + "\n\n# Instructions\n\n" + system_prompt

          # Define tools for the review loop
          tools = [
              {
                  "type": "function",
                  "function": {
                      "name": "read_file",
                      "description": "Read the contents of a file from the repository. Use this to examine source code, configuration files, or documentation.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "path": {
                                  "type": "string",
                                  "description": "The path to the file relative to the repository root (e.g., 'src/main.py', 'README.md')"
                              }
                          },
                          "required": ["path"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "grep",
                      "description": "Search for a pattern in files. Returns matching lines with file paths and line numbers.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "pattern": {
                                  "type": "string",
                                  "description": "The search pattern (supports basic regex)"
                              },
                              "path": {
                                  "type": "string",
                                  "description": "Optional: limit search to a specific file or directory (e.g., 'src/', '*.py'). If not provided, searches all tracked files."
                              }
                          },
                          "required": ["pattern"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "submit_review",
                      "description": "Submit your code review. Call this when you have finished reviewing the PR. This ends the review loop.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "review": {
                                  "type": "string",
                                  "description": "Your complete code review in markdown format, suitable for posting as a GitHub comment."
                              }
                          },
                          "required": ["review"]
                      }
                  }
              }
          ]

          def validate_path(path):
              """Validate that a path is safe (no directory traversal, within repo)."""
              normalized = os.path.normpath(path)
              if normalized.startswith('..') or normalized.startswith('/'):
                  return False, "Path must be relative to repository root and cannot use '..'"
              abs_path = os.path.abspath(normalized)
              repo_root = os.path.abspath('.')
              if not abs_path.startswith(repo_root):
                  return False, "Path must be within the repository"
              return True, normalized

          def execute_read_file(path):
              """Execute the read_file tool."""
              valid, result = validate_path(path)
              if not valid:
                  return f"Error: {result}"
              if not os.path.exists(result):
                  return f"Error: File not found: {path}"
              if os.path.isdir(result):
                  return f"Error: Path is a directory, not a file: {path}"
              try:
                  with open(result) as f:
                      content = f.read()
                  if len(content) > 50000:
                      content = content[:50000] + "\n\n... (file truncated, showing first 50000 characters)"
                  return content
              except Exception as e:
                  return f"Error reading file: {e}"

          def execute_grep(pattern, path=None):
              """Execute the grep tool."""
              try:
                  cmd = ["git", "grep", "-n", "--no-color", pattern]
                  if path:
                      valid, validated_path = validate_path(path)
                      if not valid:
                          return f"Error: {validated_path}"
                      cmd.append("--")
                      cmd.append(validated_path)
                  result = subprocess.run(
                      cmd,
                      capture_output=True,
                      text=True,
                      timeout=30
                  )
                  output = result.stdout.strip()
                  if not output:
                      return "No matches found."
                  lines = output.split('\n')
                  if len(lines) > 100:
                      output = '\n'.join(lines[:100]) + f"\n\n... ({len(lines) - 100} more matches truncated)"
                  return output
              except subprocess.TimeoutExpired:
                  return "Error: Search timed out"
              except Exception as e:
                  return f"Error executing grep: {e}"

          def execute_tool(tool_name, arguments):
              """Execute a tool and return the result."""
              if tool_name == "read_file":
                  return execute_read_file(arguments.get("path", ""))
              elif tool_name == "grep":
                  return execute_grep(arguments.get("pattern", ""), arguments.get("path"))
              elif tool_name == "submit_review":
                  return arguments.get("review", "")
              else:
                  return f"Error: Unknown tool: {tool_name}"

          # Initialize conversation
          messages = [
              {"role": "system", "content": system_prompt},
              {"role": "user", "content": user_content},
          ]

          # Track token usage across all calls
          total_input_tokens = 0
          total_output_tokens = 0
          total_cost = 0.0

          final_review = None
          last_response = None

          for iteration in range(max_iterations):
              print(f"=== Iteration {iteration + 1}/{max_iterations} ===")

              response = completion(
                  model=model,
                  messages=messages,
                  tools=tools,
                  max_tokens=16384,
              )

              # Track token usage
              usage = getattr(response, 'usage', None)
              if usage:
                  total_input_tokens += getattr(usage, 'prompt_tokens', 0)
                  total_output_tokens += getattr(usage, 'completion_tokens', 0)
              cost = getattr(response, '_hidden_params', {}).get('response_cost', None)
              if cost:
                  total_cost += cost

              message = response.choices[0].message
              last_response = message.content

              # Check if the model wants to call tools
              tool_calls = getattr(message, 'tool_calls', None)

              if not tool_calls:
                  # No tool calls — model is done or gave up without submitting
                  print("No tool calls — stopping loop")
                  break

              # Add assistant message with tool calls to conversation
              messages.append({
                  "role": "assistant",
                  "content": message.content,
                  "tool_calls": [tc.dict() for tc in tool_calls],
              })

              # Process each tool call and add results to conversation
              done = False
              for tool_call in tool_calls:
                  tool_name = tool_call.function.name
                  try:
                      arguments = json.loads(tool_call.function.arguments)
                  except json.JSONDecodeError:
                      arguments = {}

                  print(f"  Tool: {tool_name}({list(arguments.keys())})")
                  result = execute_tool(tool_name, arguments)

                  # submit_review signals end of review — capture and break
                  if tool_name == "submit_review":
                      final_review = result
                      done = True

                  messages.append({
                      "role": "tool",
                      "tool_call_id": tool_call.id,
                      "content": result,
                  })

              # Trim old tool result pairs to manage context size
              if context_keep_tool_results > 0:
                  messages = trim_tool_results(messages, context_keep_tool_results)

              if done:
                  break

              # Graceful wrapup: at 80% of max_iterations, inject a user message
              # telling the agent to wrap up and call submit_review with what it has.
              if (wrapup_enabled and wrapup_iteration > 0
                      and iteration + 1 >= wrapup_iteration):
                  remaining = max_iterations - (iteration + 1)
                  messages.append({
                      "role": "user",
                      "content": (
                          f"You have used {iteration + 1} of {max_iterations} iterations "
                          f"({remaining} remaining). "
                          "Please wrap up your review now and call submit_review with "
                          "whatever analysis you have gathered so far. "
                          "Do not start new lines of inquiry."
                      ),
                  })

          # Save usage data for the cost comment step
          with open("/tmp/llm_usage.json", "w") as f:
              json.dump({
                  "input_tokens": total_input_tokens,
                  "output_tokens": total_output_tokens,
                  "cost": total_cost,
                  "iterations": (iteration + 1) if max_iterations > 0 else 0,
              }, f)

          # Write review for the post-comment step (prefer submit_review, fall back to last response)
          review = final_review or last_response or ""
          if review:
              with open("/tmp/review_result.txt", "w") as f:
                  f.write(review)
          PYEOF

      - name: Post review comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          ALIAS="${{ needs.parse.outputs.alias }}"
          MODEL="${{ needs.parse.outputs.model }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Generate cost table (writes /tmp/cost_table.txt)
          python3 << 'PYEOF'
          import json, math, os, gzip, time
          def _fmt_tok(n):
              n = int(n)
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f"{round(v)}M" if v >= 10 else f"{round(v, 1)}M"
              elif n >= 1_000:
                  v = n / 1_000
                  return f"{round(v)}K" if v >= 10 else f"{round(v, 1)}K"
              return str(n)
          def _fmt_ela(s):
              s = int(s)
              return f"{s // 60}m {s % 60}s" if s >= 60 else f"{s}s"
          def _fmt_bpd(text, cost):
              if cost <= 0: return 'N/A'
              data = text.encode('utf-8') if isinstance(text, str) else text
              bpd = (len(gzip.compress(data)) * 8) / cost  # bits per dollar
              if bpd >= 1_000_000: return f"{bpd / 1_000_000:.1f} Mbit/$"
              return f"{bpd / 1_000:.1f} Kbit/$"
          if os.path.exists("/tmp/llm_usage.json"):
              _d = json.load(open("/tmp/llm_usage.json"))
              input_tokens = _d.get('input_tokens', 0)
              output_tokens = _d.get('output_tokens', 0)
              cost = float(_d.get('cost') or 0)
              iterations = _d.get('iterations', 0)
          else:
              input_tokens = output_tokens = 0; cost = 0.0; iterations = 0
          _max_iter_str = os.environ.get("REVIEW_MAX_ITERATIONS", "") or ""
          _max_iter = int(_max_iter_str) if _max_iter_str.isdigit() and int(_max_iter_str) > 0 else 0
          iterations_fmt = f"{iterations} / {_max_iter}" if _max_iter > 0 else str(iterations)
          try:
              _st = int(open('/tmp/start_time').read().strip())
          except Exception:
              _st = int(time.time())
          elapsed = int(time.time()) - _st
          output_text = open("/tmp/review_result.txt").read() if os.path.exists("/tmp/review_result.txt") else ""
          bits_text = output_text
          rounded = math.ceil(cost * 100) / 100
          rows = [
              ('Time', _fmt_ela(elapsed)),
              ('Iterations', iterations_fmt),
              ('Input', _fmt_tok(input_tokens) + ' tokens'),
              ('Output', _fmt_tok(output_tokens) + ' tokens'),
              ('Info/$', _fmt_bpd(bits_text, cost)),
              ('**Cost**', f'**${rounded:.2f}**'),
          ]
          _tbl = ['---', '', '### 💰 Cost', '', '| Metric | Value |', '|--------|-------|']
          _tbl += [f'| {k} | {v} |' for k, v in rows]
          open('/tmp/cost_table.txt', 'w').write('\n'.join(_tbl))
          PYEOF

          if [ -f /tmp/review_result.txt ]; then
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              cat /tmp/review_result.txt
              echo ""
              echo "---"
              echo "_Code review by \`/agent-review-${ALIAS}\` (\`${MODEL}\`)_"
              if [ -f /tmp/cost_table.txt ]; then
                echo ""
                cat /tmp/cost_table.txt
              fi
            } > /tmp/review_comment.md

            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/review_comment.md
            echo "cost embedded" > /tmp/cost_embedded
          else
            MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
            NO_OUTPUT_WARNING="⚠️ **Review did not produce output.** The agent may have exhausted all iterations without calling \`submit_review\`. See the [workflow run logs]($RUN_URL) for details."
            printf '%s\n\n%s\n' "${MODEL_HEADER}" "${NO_OUTPUT_WARNING}" > /tmp/review_no_output.md
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/review_no_output.md
          fi

      - name: Post cost comment (fallback)
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Sentinel: if cost was embedded in main comment, skip
          if [ -f /tmp/cost_embedded ]; then
            echo "Cost already embedded in main comment — skipping fallback"
            exit 0
          fi
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          MAX_ITER="${REVIEW_MAX_ITERATIONS:-}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")
          {
            echo "⚠️ Agent did not complete — partial cost:"
            echo ""
            echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
            echo ""
            echo "---"
            echo ""
            echo "### 💰 Cost"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Time | ${ELAPSED_FMT} |"
            echo "| Iterations | ${ITERATIONS_FMT} |"
            echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
            echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
            printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
          } > /tmp/cost_comment_fallback.md
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/cost_comment_fallback.md

  # --- Mode: reconcile — rebase PR onto base branch, resolve conflicts, force-push ---
  reconcile:
    needs: parse
    if: needs.parse.outputs.mode == 'reconcile'
    runs-on: ubuntu-latest

    steps:
      - name: Generate app token
        if: vars.RDB_APP_ID != ''
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          fetch-depth: 0

      - name: Checkout remote-dev-bot lib
        uses: actions/checkout@v5
        with:
          repository: gnovak/remote-dev-bot
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ inputs.rdb_ref }}
          path: .remote-dev-bot
          sparse-checkout: |
            /lib/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Determine API key
        id: apikey
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
          NO_API_KEY_WARNING="⚠️ **No API key configured for this model.**"
          post_no_api_key_comment() {
            local secret_name="$1"
            {
              printf '%s\n\n' "${MODEL_HEADER}"
              printf '%s\n\n' "${NO_API_KEY_WARNING}"
              printf 'The selected model \`%s\` (\`%s\`) requires an \`%s\` secret, but none was found.\n\n' "${ALIAS}" "${MODEL}" "${secret_name}"
              printf '**To fix:** Add your API key as a repository secret:\n'
              printf '\`\`\`bash\n'
              printf 'gh secret set %s --repo ${{ github.repository }}\n' "${secret_name}"
              printf '\`\`\`\n'
              printf 'Then re-trigger the bot by commenting the same command again.\n'
            } > /tmp/no_api_key_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/no_api_key_comment.md
          }

          if [[ "$MODEL" == anthropic/* ]]; then
            API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "ANTHROPIC_API_KEY"
              echo "::error::No ANTHROPIC_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == openai/* ]]; then
            API_KEY="${{ secrets.OPENAI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "OPENAI_API_KEY"
              echo "::error::No OPENAI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == gemini/* ]]; then
            API_KEY="${{ secrets.GEMINI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "GEMINI_API_KEY"
              echo "::error::No GEMINI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown model provider for: $MODEL"
            exit 1
          fi

      - name: Install dependencies
        run: pip install PyYAML litellm

      - name: Verify this is a PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          IS_PR=${{ (github.event.issue.pull_request || github.event.pull_request) && 'true' || 'false' }}
          if [[ "$IS_PR" != "true" ]]; then
            ALIAS="${{ needs.parse.outputs.alias }}"
            MODEL="${{ needs.parse.outputs.model }}"
            printf '🤖 **Model:** `%s` (`%s`)\n\n⚠️ `/agent-reconcile` only works on pull requests, not issues.\n' \
              "${ALIAS}" "${MODEL}" > /tmp/reconcile_not_pr.md
            gh issue comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/reconcile_not_pr.md
            exit 1
          fi

      - name: Reconcile PR
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GIT_USERNAME: ${{ github.repository_owner }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          MAX_ITERATIONS: ${{ needs.parse.outputs.max_iterations }}
          WRAPUP_ENABLED: ${{ needs.parse.outputs.graceful_wrapup_enabled }}
          WRAPUP_ITERATION: ${{ needs.parse.outputs.graceful_wrapup_iteration }}
          STATUS_LOG_INTERVAL: ${{ needs.parse.outputs.status_log_interval }}
          ALIAS: ${{ needs.parse.outputs.alias }}
          EXTRA_FILES: ${{ needs.parse.outputs.extra_files }}
          EXTRA_INSTRUCTIONS: ${{ needs.parse.outputs.extra_instructions }}
          MODEL_EXTRA_INSTRUCTIONS: ${{ needs.parse.outputs.model_extra_instructions }}
        run: |
          PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          # Determine base branch from the PR
          BASE_BRANCH=$(gh pr view "$PR_NUMBER" --json baseRefName --jq '.baseRefName')
          export BASE_BRANCH
          echo "Reconciling PR #${PR_NUMBER} onto base branch: ${BASE_BRANCH}"

          TIMEOUT_MINUTES="${{ needs.parse.outputs.timeout_minutes }}"
          TIMEOUT_SECONDS=$((TIMEOUT_MINUTES * 60))
          echo "Reconcile timeout: ${TIMEOUT_MINUTES} minutes"
          echo $(date +%s) > /tmp/start_time

          timeout --kill-after=60 "$TIMEOUT_SECONDS" \
            python3 .remote-dev-bot/lib/reconcile.py
          RECONCILE_EXIT_CODE=$?

          if [[ $RECONCILE_EXIT_CODE -eq 124 ]]; then
            echo "::warning::Reconciler timed out after ${TIMEOUT_MINUTES} minutes. Cleanup steps will still run."
          fi

          exit $RECONCILE_EXIT_CODE

      - name: Post result comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ ! -f /tmp/resolve_status.json ]]; then
            ALIAS="${{ needs.parse.outputs.alias }}"
            MODEL="${{ needs.parse.outputs.model }}"
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ⚠️ Reconcile agent exited unexpectedly"
              echo ""
              echo "See the [workflow run logs]($RUN_URL) for full details."
            } > /tmp/failure_comment.md
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/failure_comment.md
            exit 0
          fi

          SUCCESS=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print('true' if d.get('success') else 'false')")
          EXPLANATION=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print(d.get('explanation',''))")

          if [[ "$SUCCESS" == "false" ]]; then
            ALIAS="${{ needs.parse.outputs.alias }}"
            MODEL="${{ needs.parse.outputs.model }}"
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ⚠️ Reconcile could not be completed"
              echo ""
              if [[ -n "$EXPLANATION" ]]; then
                echo "$EXPLANATION"
                echo ""
              fi
              echo "See the [workflow run logs]($RUN_URL) for full details."
            } > /tmp/failure_comment.md
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/failure_comment.md
          fi
          # Success case: reconcile.py already posted the success comment

      - name: Write step summary
        if: always()
        env:
          ALIAS: ${{ needs.parse.outputs.alias }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
        run: |
          if [ -f /tmp/llm_usage.json ]; then
            cost=$(python3 -c "import json; d=json.load(open('/tmp/llm_usage.json')); print(f\"\${d.get('cost',0):.2f}\")")
            iters=$(python3 -c "import json; d=json.load(open('/tmp/llm_usage.json')); print(d.get('iterations',0))")
          else
            cost="unknown"
            iters="unknown"
          fi
          if [ -f /tmp/resolve_status.json ]; then
            success=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print('✅' if d.get('success') else '❌')")
            explanation=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')); print(d.get('explanation','')[:200])")
          else
            success="❓"
            explanation="No status recorded"
          fi
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Reconcile Run Summary
          | | |
          |---|---|
          | **Result** | $success |
          | **Cost** | \$$cost |
          | **Iterations** | $iters |
          | **Model** | ${{ env.ALIAS }} (${{ env.LLM_MODEL }}) |

          **Status:** $explanation
          EOF

      - name: Post cost comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          MAX_ITER="${{ needs.parse.outputs.max_iterations }}"

          python3 << 'PYEOF'
          import json, math, os, gzip, time
          def _fmt_tok(n):
              n = int(n)
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f"{round(v)}M" if v >= 10 else f"{round(v, 1)}M"
              elif n >= 1_000:
                  v = n / 1_000
                  return f"{round(v)}K" if v >= 10 else f"{round(v, 1)}K"
              return str(n)
          def _fmt_ela(s):
              s = int(s)
              return f"{s // 60}m {s % 60}s" if s >= 60 else f"{s}s"
          def _fmt_bpd(text, cost):
              if cost <= 0: return 'N/A'
              data = text.encode('utf-8') if isinstance(text, str) else text
              bpd = (len(gzip.compress(data)) * 8) / cost  # bits per dollar
              if bpd >= 1_000_000: return f"{bpd / 1_000_000:.1f} Mbit/$"
              return f"{bpd / 1_000:.1f} Kbit/$"
          if os.path.exists("/tmp/llm_usage.json"):
              _d = json.load(open("/tmp/llm_usage.json"))
              input_tokens = _d.get('input_tokens', 0)
              output_tokens = _d.get('output_tokens', 0)
              cost = float(_d.get('cost') or 0)
              iterations = _d.get('iterations', 0)
          else:
              input_tokens = output_tokens = 0; cost = 0.0; iterations = 0
          _max_iter_str = os.environ.get("MAX_ITER", "") or ""
          _max_iter = int(_max_iter_str) if _max_iter_str.isdigit() and int(_max_iter_str) > 0 else 0
          iterations_fmt = f"{iterations} / {_max_iter}" if _max_iter > 0 else str(iterations)
          try:
              _st = int(open('/tmp/start_time').read().strip())
          except Exception:
              _st = int(time.time())
          elapsed = int(time.time()) - _st
          import subprocess as _sp, re as _re
          # SHA written by reconcile.py/setup_branch() after branching — reflects
          # the true diff base regardless of what the workflow checked out.
          _base = open('/tmp/agent_start_sha').read().strip() if os.path.exists('/tmp/agent_start_sha') else None
          _base_ref = _base or '$(git merge-base HEAD origin/main)'
          _dp = _sp.run(f'git diff {_base_ref} HEAD 2>/dev/null || echo ""', shell=True, capture_output=True, text=True)
          diff_text = _dp.stdout or ''
          _ss = _sp.run(f'git diff --shortstat {_base_ref} HEAD 2>/dev/null || echo ""', shell=True, capture_output=True, text=True)
          shortstat = _ss.stdout.strip()
          loc_changed = 0
          _m = _re.search(r"(\d+) insertion", shortstat)
          if _m: loc_changed += int(_m.group(1))
          _m = _re.search(r"(\d+) deletion", shortstat)
          if _m: loc_changed += int(_m.group(1))
          bits_text = diff_text
          rounded = math.ceil(cost * 100) / 100
          def _fmt_loc(n):
              if n >= 1_000_000: return f"{n/1_000_000:.1f}M"
              if n >= 1_000: return f"{n/1_000:.1f}k"
              return str(n)
          alias = os.environ.get("ALIAS", "")
          model = os.environ.get("MODEL", "")
          rows = [
              ('Time', _fmt_ela(elapsed)),
              ('Iterations', iterations_fmt),
              ('Input', _fmt_tok(input_tokens) + ' tokens'),
              ('Output', _fmt_tok(output_tokens) + ' tokens'),
              ('Diff', shortstat if shortstat else 'N/A'),
              ('LOC/$', f'{_fmt_loc(int(loc_changed / cost))} loc/$' if cost > 0 and loc_changed > 0 else 'N/A'),
              ('Info/$', _fmt_bpd(bits_text, cost)),
              ('**Cost**', f'**${rounded:.2f}**'),
          ]
          lines = [
              f'🤖 **Model:** `{alias}` (`{model}`)',
              '',
              '---',
              '',
              '### 💰 Cost',
              '',
              '| Metric | Value |',
              '|--------|-------|',
          ]
          lines += [f'| {k} | {v} |' for k, v in rows]
          open('/tmp/cost_comment.md', 'w').write('\n'.join(lines) + '\n')
          PYEOF

          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/cost_comment.md

  # --- Mode: design — multi-round agentic loop with tool calling ---
  design:
    needs: parse
    if: needs.parse.outputs.mode == 'design'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate app token
        if: vars.RDB_APP_ID != ''
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}

      - name: Resolve checkout ref
        id: resolve_ref
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          TARGET_BRANCH_EXPLICIT: ${{ needs.parse.outputs.target_branch_explicit }}
          TARGET_BRANCH: ${{ needs.parse.outputs.target_branch }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          ISSUE_TYPE="${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}"
          # For PR triggers with no explicit branch: check out the PR head (the proposed changes).
          # For issue triggers: check out the configured target_branch.
          if [[ "$ISSUE_TYPE" == "pr" && "$TARGET_BRANCH_EXPLICIT" != "true" ]]; then
            REF=$(gh pr view "$ISSUE_NUMBER" --json headRefName --jq '.headRefName')
          else
            REF="$TARGET_BRANCH"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Resolved checkout ref: $REF (issue_type=$ISSUE_TYPE)"

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ steps.resolve_ref.outputs.ref }}

      - name: Capture checkout info
        id: checkout_info
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          SHA=$(git rev-parse --short HEAD)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Checked out branch=$BRANCH sha=$SHA"

      - name: Checkout remote-dev-bot config
        uses: actions/checkout@v5
        with:
          repository: gnovak/remote-dev-bot
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ inputs.rdb_ref }}
          path: .remote-dev-bot
          sparse-checkout: |
            /remote-dev-bot.yaml
            /lib/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyYAML litellm

      - name: Generate repo index
        run: |
          python3 .remote-dev-bot/lib/generate_index.py > /tmp/rdb-index.md
          EXTRA_FILES_RAW='${{ needs.parse.outputs.extra_files }}'
          RDB_EXTRA_FILES=$(python3 -c "import json,sys; raw=sys.argv[1]; files=json.loads(raw) if raw and raw not in ('null','') else []; files.append('/tmp/rdb-index.md'); print(json.dumps(files))" "$EXTRA_FILES_RAW")
          echo "RDB_EXTRA_FILES=$RDB_EXTRA_FILES" >> "$GITHUB_ENV"

      - name: Determine API key
        id: apikey
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Select the correct API key based on the model's provider prefix.
          # Writing to GITHUB_OUTPUT passes values between steps as step outputs.
          # GitHub Actions automatically masks secret values in logs — this does
          # NOT print the key. The key is consumed by the next step as
          # ${{ steps.apikey.outputs.key }} and never appears in plaintext output.
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          # Helper: post a friendly comment when the required API key secret is missing.
          MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
          NO_API_KEY_WARNING="⚠️ **No API key configured for this model.**"
          post_no_api_key_comment() {
            local secret_name="$1"
            {
              printf '%s\n\n' "${MODEL_HEADER}"
              printf '%s\n\n' "${NO_API_KEY_WARNING}"
              printf 'The selected model \`%s\` (\`%s\`) requires an \`%s\` secret, but none was found.\n\n' "${ALIAS}" "${MODEL}" "${secret_name}"
              printf '**To fix:** Add your API key as a repository secret:\n'
              printf '\`\`\`bash\n'
              printf 'gh secret set %s --repo ${{ github.repository }}\n' "${secret_name}"
              printf '\`\`\`\n'
              printf 'Then re-trigger the bot by commenting the same command again.\n'
            } > /tmp/no_api_key_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/no_api_key_comment.md
          }

          if [[ "$MODEL" == anthropic/* ]]; then
            API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "ANTHROPIC_API_KEY"
              echo "::error::No ANTHROPIC_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == openai/* ]]; then
            API_KEY="${{ secrets.OPENAI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "OPENAI_API_KEY"
              echo "::error::No OPENAI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == gemini/* ]]; then
            API_KEY="${{ secrets.GEMINI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "GEMINI_API_KEY"
              echo "::error::No GEMINI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown model provider for: $MODEL"
            exit 1
          fi

      - name: Gather issue context
        id: context
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}

          # Fetch issue title and body
          ISSUE_JSON=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER})
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          ISSUE_BODY=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body','') or '')")

          # Fetch all comments (up to 100 — GitHub API max per page)
          COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments?per_page=100")
          COMMENTS=$(echo "$COMMENTS_JSON" | python3 -c "
          import sys, json
          comments = json.load(sys.stdin)
          for c in reversed(comments):
              user = c['user']['login']
              body = c.get('body','')
              print(f'--- @{user} ---')
              print(body)
              print()
          ")

          # Write to files to avoid shell escaping issues
          echo "$ISSUE_TITLE" > /tmp/issue_title.txt
          echo "$ISSUE_BODY" > /tmp/issue_body.txt
          echo "$COMMENTS" > /tmp/issue_comments.txt
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Run design loop
        id: design
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EXTRA_FILES: ${{ env.RDB_EXTRA_FILES }}
          DESIGN_MAX_ITERATIONS: ${{ needs.parse.outputs.design_max_iterations }}
          DESIGN_CONTEXT_KEEP_TOOL_RESULTS: ${{ needs.parse.outputs.design_context_keep_tool_results }}
          DESIGN_WRAPUP_ENABLED: ${{ needs.parse.outputs.graceful_wrapup_enabled }}
          DESIGN_WRAPUP_ITERATION: ${{ needs.parse.outputs.graceful_wrapup_iteration }}
        run: |
          date +%s > /tmp/start_time
          python3 << 'PYEOF'
          import json
          import os
          import re
          import subprocess
          import sys

          sys.path.insert(0, ".remote-dev-bot/lib")
          from context import trim_tool_results
          from litellm import completion

          model = "${{ needs.parse.outputs.model }}"

          # Load extra_instructions from parse outputs (mode-level + model-level combined)
          extra_instructions = "\n\n".join(p for p in [
              "${{ needs.parse.outputs.extra_instructions }}",
              "${{ needs.parse.outputs.model_extra_instructions }}",
          ] if p)

          # Get max iterations from config (default 10)
          max_iterations = int(os.environ.get("DESIGN_MAX_ITERATIONS", "10") or "10")

          # Graceful wrapup settings
          wrapup_enabled = os.environ.get("DESIGN_WRAPUP_ENABLED", "true").lower() == "true"
          wrapup_iteration = int(os.environ.get("DESIGN_WRAPUP_ITERATION", "0") or "0")

          # Context trimming
          context_keep_tool_results = int(os.environ.get("DESIGN_CONTEXT_KEEP_TOOL_RESULTS", "0") or "0")

          # Generate repository file listing (tracked files only)
          result = subprocess.run(
              ["git", "ls-files"],
              capture_output=True, text=True
          )
          file_listing = result.stdout.strip()
          repo_context = f"## Repository File Listing\n\n```\n{file_listing}\n```"

          # Read repo context files (missing files are skipped gracefully)
          context_files = json.loads(os.environ.get("EXTRA_FILES", "[]") or "[]")
          for filepath in context_files:
              if os.path.exists(filepath):
                  with open(filepath) as f:
                      content = f.read().strip()
                  if content:
                      repo_context += f"\n\n## File: {filepath}\n\n{content}"

          # Read issue context
          with open("/tmp/issue_title.txt") as f:
              title = f.read().strip()
          with open("/tmp/issue_body.txt") as f:
              body = f.read().strip()
          with open("/tmp/issue_comments.txt") as f:
              comments = f.read().strip()

          # Build the user content
          user_content = f"""## Issue: {title}

          {body}

          ## Discussion so far:
          {comments}
          """

          system_prompt = (
              "You are analyzing a GitHub issue for design discussion using an agentic exploration loop. "
              "You have access to tools to read files and search the codebase. "
              "Use these tools to gather the information you need before providing your analysis. "
              "When you have enough information, call submit_analysis with your final analysis. "
              "Never begin your response with a slash command like /agent."
              "\n\nBefore forming your analysis, explore the codebase thoroughly: read relevant source files, look for sample data or test fixtures, and examine existing patterns. Understand what is actually there before proposing what should be.\n\n"
              "Calibrate your analysis to the level of abstraction signaled by the issue:\n\n"
              "- **High-level design** (e.g. \"analyze the architecture\", \"what's the right approach\", \"design X\"): Stay at the boxes-and-arrows level. Focus on major components, data flow, key trade-offs, and alternatives considered. Keep it concise. Don't dig into file formats or implementation details unless they materially affect the design decision.\n\n"
              "- **Implementation spec** (e.g. \"write an implementation spec\", \"spec out\", \"acceptance criteria\", \"how exactly should X work\"): Ground your analysis in real artifacts. Find and read sample data files in the repo — don't describe formats abstractly when you can examine them directly. Include: (1) a concrete input→output example using real data from the repo, (2) an \"Open Questions\" section listing anything genuinely unresolved or unspecified, and (3) acceptance criteria specific enough to verify programmatically.\n\n"
              "If the issue doesn't clearly signal one or the other, default to high-level design."
              "\n\nLength and tone: your analysis will be posted as a GitHub comment "
              "and may be read by a subsequent resolve agent as part of its task context. "
              "Say what needs to be said — don't pad, don't repeat the issue back, "
              "don't add caveats for their own sake. "
              "Do not truncate or trail off mid-sentence."
          )

          if extra_instructions:
              system_prompt += "\n\n" + extra_instructions

          if repo_context:
              system_prompt = "# Repository Context\n" + repo_context + "\n\n# Instructions\n\n" + system_prompt

          # Define tools for the agentic loop
          tools = [
              {
                  "type": "function",
                  "function": {
                      "name": "read_file",
                      "description": "Read the contents of a file from the repository. Use this to examine source code, configuration files, or documentation.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "path": {
                                  "type": "string",
                                  "description": "The path to the file relative to the repository root (e.g., 'src/main.py', 'README.md')"
                              }
                          },
                          "required": ["path"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "grep",
                      "description": "Search for a pattern in files. Returns matching lines with file paths and line numbers.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "pattern": {
                                  "type": "string",
                                  "description": "The search pattern (supports basic regex)"
                              },
                              "path": {
                                  "type": "string",
                                  "description": "Optional: limit search to a specific file or directory (e.g., 'src/', '*.py'). If not provided, searches all tracked files."
                              }
                          },
                          "required": ["pattern"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "submit_analysis",
                      "description": "Submit your final design analysis. Call this when you have gathered enough information and are ready to provide your analysis. This will end the exploration loop.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "analysis": {
                                  "type": "string",
                                  "description": "Your complete design analysis in markdown format, suitable for posting as a GitHub comment."
                              }
                          },
                          "required": ["analysis"]
                      }
                  }
              }
          ]

          def validate_path(path):
              """Validate that a path is safe (no directory traversal, within repo)."""
              # Normalize the path
              normalized = os.path.normpath(path)
              # Check for directory traversal
              if normalized.startswith('..') or normalized.startswith('/'):
                  return False, "Path must be relative to repository root and cannot use '..'"
              # Check that the path doesn't escape the repo
              abs_path = os.path.abspath(normalized)
              repo_root = os.path.abspath('.')
              if not abs_path.startswith(repo_root):
                  return False, "Path must be within the repository"
              return True, normalized

          def execute_read_file(path):
              """Execute the read_file tool."""
              valid, result = validate_path(path)
              if not valid:
                  return f"Error: {result}"
              if not os.path.exists(result):
                  return f"Error: File not found: {path}"
              if os.path.isdir(result):
                  return f"Error: Path is a directory, not a file: {path}"
              try:
                  with open(result) as f:
                      content = f.read()
                  # Limit content size to avoid token explosion
                  if len(content) > 50000:
                      content = content[:50000] + "\n\n... (file truncated, showing first 50000 characters)"
                  return content
              except Exception as e:
                  return f"Error reading file: {e}"

          def execute_grep(pattern, path=None):
              """Execute the grep tool."""
              try:
                  cmd = ["git", "grep", "-n", "--no-color", pattern]
                  if path:
                      valid, validated_path = validate_path(path)
                      if not valid:
                          return f"Error: {validated_path}"
                      cmd.append("--")
                      cmd.append(validated_path)
                  result = subprocess.run(
                      cmd,
                      capture_output=True,
                      text=True,
                      timeout=30
                  )
                  output = result.stdout.strip()
                  if not output:
                      return "No matches found."
                  # Limit output size
                  lines = output.split('\n')
                  if len(lines) > 100:
                      output = '\n'.join(lines[:100]) + f"\n\n... ({len(lines) - 100} more matches truncated)"
                  return output
              except subprocess.TimeoutExpired:
                  return "Error: Search timed out"
              except Exception as e:
                  return f"Error executing grep: {e}"

          def execute_tool(tool_name, arguments):
              """Execute a tool and return the result."""
              if tool_name == "read_file":
                  return execute_read_file(arguments.get("path", ""))
              elif tool_name == "grep":
                  return execute_grep(arguments.get("pattern", ""), arguments.get("path"))
              elif tool_name == "submit_analysis":
                  return arguments.get("analysis", "")
              else:
                  return f"Error: Unknown tool: {tool_name}"

          # Initialize conversation
          messages = [
              {"role": "system", "content": system_prompt},
              {"role": "user", "content": user_content},
          ]

          # Track token usage across all calls
          total_input_tokens = 0
          total_output_tokens = 0
          total_cost = 0.0

          final_analysis = None
          last_response = None

          for iteration in range(max_iterations):
              print(f"=== Iteration {iteration + 1}/{max_iterations} ===")

              response = completion(
                  model=model,
                  messages=messages,
                  tools=tools,
                  max_tokens=16384,
              )

              # Track token usage
              usage = getattr(response, 'usage', None)
              if usage:
                  total_input_tokens += getattr(usage, 'prompt_tokens', 0)
                  total_output_tokens += getattr(usage, 'completion_tokens', 0)
              cost = getattr(response, '_hidden_params', {}).get('response_cost', None)
              if cost:
                  total_cost += cost

              message = response.choices[0].message
              last_response = message.content

              # Check if the model wants to call tools
              tool_calls = getattr(message, 'tool_calls', None)

              if not tool_calls:
                  # No tool calls — model is done or gave up without submitting
                  print("No tool calls — stopping loop")
                  break

              # Add assistant message with tool calls to conversation
              messages.append({
                  "role": "assistant",
                  "content": message.content,
                  "tool_calls": [tc.dict() for tc in tool_calls],
              })

              # Process each tool call and add results to conversation
              done = False
              for tool_call in tool_calls:
                  tool_name = tool_call.function.name
                  try:
                      arguments = json.loads(tool_call.function.arguments)
                  except json.JSONDecodeError:
                      arguments = {}

                  print(f"  Tool: {tool_name}({list(arguments.keys())})")
                  result = execute_tool(tool_name, arguments)

                  # submit_analysis signals end of exploration — capture and break
                  if tool_name == "submit_analysis":
                      final_analysis = result
                      done = True

                  messages.append({
                      "role": "tool",
                      "tool_call_id": tool_call.id,
                      "content": result,
                  })

              # Trim old tool result pairs to manage context size
              if context_keep_tool_results > 0:
                  messages = trim_tool_results(messages, context_keep_tool_results)

              if done:
                  break

              # Graceful wrapup: at 80% of max_iterations, inject a user message
              # telling the agent to wrap up and call submit_analysis with what it has.
              if (wrapup_enabled and wrapup_iteration > 0
                      and iteration + 1 >= wrapup_iteration):
                  remaining = max_iterations - (iteration + 1)
                  messages.append({
                      "role": "user",
                      "content": (
                          f"You have used {iteration + 1} of {max_iterations} iterations "
                          f"({remaining} remaining). "
                          "Please wrap up your analysis now and call submit_analysis with "
                          "whatever analysis you have gathered so far. "
                          "Do not start new lines of inquiry."
                      ),
                  })

          # Save usage data for the cost comment step
          with open("/tmp/llm_usage.json", "w") as f:
              json.dump({
                  "input_tokens": total_input_tokens,
                  "output_tokens": total_output_tokens,
                  "cost": total_cost,
                  "iterations": (iteration + 1) if max_iterations > 0 else 0,
              }, f)

          # Write analysis for the post-comment step (prefer submit_analysis, fall back to last response)
          analysis = final_analysis or last_response or ""
          if analysis:
              with open("/tmp/design_analysis.txt", "w") as f:
                  f.write(analysis)

          # Loop prevention: detect /agent commands anywhere in the analysis
          import re
          agent_pattern = re.compile(r'^/agent', re.MULTILINE)
          if analysis and agent_pattern.search(analysis):
              with open("/tmp/llm_blocked", "w") as f:
                  f.write("Loop blocked: /agent command detected in design analysis\n")
          PYEOF

      - name: Post analysis comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          ALIAS="${{ needs.parse.outputs.alias }}"
          MODEL="${{ needs.parse.outputs.model }}"
          BRANCH="${{ steps.checkout_info.outputs.branch }}"
          SHA="${{ steps.checkout_info.outputs.sha }}"
          MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`) · 📍 **Branch:** \`${BRANCH}\` (\`${SHA}\`)"

          # Generate cost table (writes /tmp/cost_table.txt)
          python3 << 'PYEOF'
          import json, math, os, gzip, time
          def _fmt_tok(n):
              n = int(n)
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f"{round(v)}M" if v >= 10 else f"{round(v, 1)}M"
              elif n >= 1_000:
                  v = n / 1_000
                  return f"{round(v)}K" if v >= 10 else f"{round(v, 1)}K"
              return str(n)
          def _fmt_ela(s):
              s = int(s)
              return f"{s // 60}m {s % 60}s" if s >= 60 else f"{s}s"
          def _fmt_bpd(text, cost):
              if cost <= 0: return 'N/A'
              data = text.encode('utf-8') if isinstance(text, str) else text
              bpd = (len(gzip.compress(data)) * 8) / cost  # bits per dollar
              if bpd >= 1_000_000: return f"{bpd / 1_000_000:.1f} Mbit/$"
              return f"{bpd / 1_000:.1f} Kbit/$"
          if os.path.exists("/tmp/llm_usage.json"):
              _d = json.load(open("/tmp/llm_usage.json"))
              input_tokens = _d.get('input_tokens', 0)
              output_tokens = _d.get('output_tokens', 0)
              cost = float(_d.get('cost') or 0)
              iterations = _d.get('iterations', 0)
          else:
              input_tokens = output_tokens = 0; cost = 0.0; iterations = 0
          _max_iter_str = os.environ.get("DESIGN_MAX_ITERATIONS", "") or ""
          _max_iter = int(_max_iter_str) if _max_iter_str.isdigit() and int(_max_iter_str) > 0 else 0
          iterations_fmt = f"{iterations} / {_max_iter}" if _max_iter > 0 else str(iterations)
          try:
              _st = int(open('/tmp/start_time').read().strip())
          except Exception:
              _st = int(time.time())
          elapsed = int(time.time()) - _st
          output_text = open("/tmp/design_analysis.txt").read() if os.path.exists("/tmp/design_analysis.txt") else ""
          bits_text = output_text
          rounded = math.ceil(cost * 100) / 100
          rows = [
              ('Time', _fmt_ela(elapsed)),
              ('Iterations', iterations_fmt),
              ('Input', _fmt_tok(input_tokens) + ' tokens'),
              ('Output', _fmt_tok(output_tokens) + ' tokens'),
              ('Info/$', _fmt_bpd(bits_text, cost)),
              ('**Cost**', f'**${rounded:.2f}**'),
          ]
          _tbl = ['---', '', '### 💰 Cost', '', '| Metric | Value |', '|--------|-------|']
          _tbl += [f'| {k} | {v} |' for k, v in rows]
          open('/tmp/cost_table.txt', 'w').write('\n'.join(_tbl))
          PYEOF

          if [ -f /tmp/llm_blocked ]; then
            LOOP_BLOCKED_WARNING="⚠️ **Agent loop blocked!** The design analysis response contained \`/agent\` command(s) which could trigger a recursive agent loop. The response has been blocked for safety."
            printf '%s\n\n%s\n' "${MODEL_HEADER}" "${LOOP_BLOCKED_WARNING}" > /tmp/loop_blocked_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/loop_blocked_comment.md
          elif [ -f /tmp/design_analysis.txt ]; then
            {
              echo "${MODEL_HEADER}"
              echo ""
              cat /tmp/design_analysis.txt
              echo ""
              echo "---"
              echo "_Design analysis by \`/agent-design-${ALIAS}\` (\`${MODEL}\`)_"
              if [ -f /tmp/cost_table.txt ]; then
                echo ""
                cat /tmp/cost_table.txt
              fi
            } > /tmp/analysis_comment.md

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/analysis_comment.md
            echo "cost embedded" > /tmp/cost_embedded
          else
            NO_ANALYSIS_WARNING="⚠️ **Exploration did not produce an analysis.** The agent may have exhausted all iterations without calling \`submit_analysis\`. See the [workflow run logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            printf '%s\n\n%s\n' "${MODEL_HEADER}" "${NO_ANALYSIS_WARNING}" > /tmp/no_analysis_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/no_analysis_comment.md
          fi

      - name: Post cost comment (fallback)
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Sentinel: if cost was embedded in main comment, skip
          if [ -f /tmp/cost_embedded ]; then
            echo "Cost already embedded in main comment — skipping fallback"
            exit 0
          fi
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          MAX_ITER="${DESIGN_MAX_ITERATIONS:-}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")
          {
            echo "⚠️ Agent did not complete — partial cost:"
            echo ""
            echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
            echo ""
            echo "---"
            echo ""
            echo "### 💰 Cost"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Time | ${ELAPSED_FMT} |"
            echo "| Iterations | ${ITERATIONS_FMT} |"
            echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
            echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
            printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
          } > /tmp/cost_comment_fallback.md
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/cost_comment_fallback.md

  # --- Mode: workshop — multi-model design council with human checkpoints ---
  workshop:
    needs: parse
    if: needs.parse.outputs.mode == 'workshop'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate app token
        if: vars.RDB_APP_ID != ''
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}

      - name: Resolve checkout ref
        id: resolve_ref
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          TARGET_BRANCH_EXPLICIT: ${{ needs.parse.outputs.target_branch_explicit }}
          TARGET_BRANCH: ${{ needs.parse.outputs.target_branch }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          ISSUE_TYPE="${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}"
          # For PR triggers with no explicit branch: check out the PR head (the proposed changes).
          # For issue triggers: check out the configured target_branch.
          if [[ "$ISSUE_TYPE" == "pr" && "$TARGET_BRANCH_EXPLICIT" != "true" ]]; then
            REF=$(gh pr view "$ISSUE_NUMBER" --json headRefName --jq '.headRefName')
          else
            REF="$TARGET_BRANCH"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Resolved checkout ref: $REF (issue_type=$ISSUE_TYPE)"

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ steps.resolve_ref.outputs.ref }}

      - name: Checkout remote-dev-bot config
        uses: actions/checkout@v5
        with:
          repository: gnovak/remote-dev-bot
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ inputs.rdb_ref }}
          path: .remote-dev-bot
          sparse-checkout: |
            /remote-dev-bot.yaml
            /lib/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyYAML litellm

      - name: Generate repo index
        run: |
          python3 .remote-dev-bot/lib/generate_index.py > /tmp/rdb-index.md
          EXTRA_FILES_RAW='${{ needs.parse.outputs.extra_files }}'
          RDB_EXTRA_FILES=$(python3 -c "import json,sys; raw=sys.argv[1]; files=json.loads(raw) if raw and raw not in ('null','') else []; files.append('/tmp/rdb-index.md'); print(json.dumps(files))" "$EXTRA_FILES_RAW")
          echo "RDB_EXTRA_FILES=$RDB_EXTRA_FILES" >> "$GITHUB_ENV"

      - name: Determine API key
        id: apikey
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Select the correct API key based on the design model's provider prefix.
          # Writing to GITHUB_OUTPUT passes values between steps as step outputs.
          # GitHub Actions automatically masks secret values in logs — this does
          # NOT print the key. The key is consumed by the next step as
          # ${{ steps.apikey.outputs.key }} and never appears in plaintext output.
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          # Helper: post a friendly comment when the required API key secret is missing.
          MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
          NO_API_KEY_WARNING="⚠️ **No API key configured for this model.**"
          post_no_api_key_comment() {
            local secret_name="$1"
            {
              printf '%s\n\n' "${MODEL_HEADER}"
              printf '%s\n\n' "${NO_API_KEY_WARNING}"
              printf 'The selected model \`%s\` (\`%s\`) requires an \`%s\` secret, but none was found.\n\n' "${ALIAS}" "${MODEL}" "${secret_name}"
              printf '**To fix:** Add your API key as a repository secret:\n'
              printf '\`\`\`bash\n'
              printf 'gh secret set %s --repo ${{ github.repository }}\n' "${secret_name}"
              printf '\`\`\`\n'
              printf 'Then re-trigger the bot by commenting the same command again.\n'
            } > /tmp/no_api_key_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/no_api_key_comment.md
          }

          if [[ "$MODEL" == anthropic/* ]]; then
            API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "ANTHROPIC_API_KEY"
              echo "::error::No ANTHROPIC_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == openai/* ]]; then
            API_KEY="${{ secrets.OPENAI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "OPENAI_API_KEY"
              echo "::error::No OPENAI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == gemini/* ]]; then
            API_KEY="${{ secrets.GEMINI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "GEMINI_API_KEY"
              echo "::error::No GEMINI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown model provider for: $MODEL"
            exit 1
          fi

      - name: Gather issue context
        id: context
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}

          # Fetch issue title and body
          ISSUE_JSON=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER})
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          ISSUE_BODY=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body','') or '')")

          # Fetch all comments (up to 100 — GitHub API max per page)
          COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments?per_page=100")
          COMMENTS=$(echo "$COMMENTS_JSON" | python3 -c "
          import sys, json
          comments = json.load(sys.stdin)
          for c in reversed(comments):
              user = c['user']['login']
              body = c.get('body','')
              print(f'--- @{user} ---')
              print(body)
              print()
          ")

          # Write to files to avoid shell escaping issues
          echo "$ISSUE_TITLE" > /tmp/issue_title.txt
          echo "$ISSUE_BODY" > /tmp/issue_body.txt
          echo "$COMMENTS" > /tmp/issue_comments.txt
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Run workshop
        id: workshop
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TYPE: ${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          MAX_ITERATIONS: ${{ needs.parse.outputs.workshop_max_iterations }}
          COUNCIL_MODELS: ${{ needs.parse.outputs.council_models }}
          EXTRA_FILES: ${{ env.RDB_EXTRA_FILES }}
          WRAPUP_ENABLED: ${{ needs.parse.outputs.graceful_wrapup_enabled }}
          WRAPUP_ITERATION: ${{ needs.parse.outputs.graceful_wrapup_iteration }}
        run: |
          date +%s > /tmp/start_time
          python3 << 'PYEOF'
          import json
          import os
          import subprocess
          import sys

          sys.path.insert(0, ".remote-dev-bot/lib")

          from workshop import run_workshop

          model = os.environ["LLM_MODEL"]
          alias = "${{ needs.parse.outputs.alias }}"
          issue_number = os.environ["ISSUE_NUMBER"]
          github_repo = os.environ["GITHUB_REPO"]
          github_token = os.environ["GITHUB_TOKEN"]

          max_iterations = int(os.environ.get("MAX_ITERATIONS", "15") or "15")
          wrapup_enabled = os.environ.get("WRAPUP_ENABLED", "true").lower() == "true"
          wrapup_iteration = int(os.environ.get("WRAPUP_ITERATION", "0") or "0")

          # Council models from parse job (JSON list of {alias, id} dicts)
          council_models = json.loads(os.environ.get("COUNCIL_MODELS", "[]") or "[]")

          # Load extra_instructions from parse outputs
          # council_extra_instructions is mode-level only (each reviewer adds their own model-level)
          council_extra_instructions = "${{ needs.parse.outputs.extra_instructions }}"
          model_extra_instructions = "${{ needs.parse.outputs.model_extra_instructions }}"
          # Stage 1 design agent gets mode + model combined
          extra_instructions = "\n\n".join(p for p in [council_extra_instructions, model_extra_instructions] if p)

          # Generate repository file listing (tracked files only)
          proc = subprocess.run(
              ["git", "ls-files"],
              capture_output=True, text=True
          )
          file_listing = proc.stdout.strip()
          extra_context = f"## Repository File Listing\n\n```\n{file_listing}\n```"

          # Read repo context files (missing files are skipped gracefully)
          context_files = json.loads(os.environ.get("EXTRA_FILES", "[]") or "[]")
          for filepath in context_files:
              if os.path.exists(filepath):
                  with open(filepath) as f:
                      content = f.read().strip()
                  if content:
                      extra_context += f"\n\n## File: {filepath}\n\n{content}"

          # Read issue context
          with open("/tmp/issue_title.txt") as f:
              issue_title = f.read().strip()
          with open("/tmp/issue_body.txt") as f:
              issue_body = f.read().strip()
          with open("/tmp/issue_comments.txt") as f:
              issue_comments = f.read().strip()

          # post_comment_fn: posts a comment on the issue via gh CLI
          def post_comment(body):
              proc = subprocess.run(
                  ["gh", "issue", "comment", issue_number,
                   "--repo", github_repo,
                   "--body", body],
                  env={**os.environ, "GH_TOKEN": github_token},
                  capture_output=True, text=True,
              )
              if proc.returncode != 0:
                  print(f"Warning: failed to post comment: {proc.stderr}", file=sys.stderr)

          # Run the workshop (Stages 1 and 2)
          workshop_result = run_workshop(
              model=model,
              model_alias=alias,
              council_models=council_models,
              issue_title=issue_title,
              issue_body=issue_body,
              issue_comments=issue_comments,
              extra_instructions=extra_instructions,
              council_extra_instructions=council_extra_instructions,
              extra_context=extra_context,
              max_iterations=max_iterations,
              wrapup_enabled=wrapup_enabled,
              wrapup_iteration=wrapup_iteration,
              post_comment_fn=post_comment,
          )

          # Save usage data for the cost fallback step
          with open("/tmp/llm_usage.json", "w") as f:
              json.dump({
                  "input_tokens": workshop_result.get("total_input_tokens", 0),
                  "output_tokens": workshop_result.get("total_output_tokens", 0),
                  "cost": workshop_result.get("total_cost", 0.0),
                  "iterations": workshop_result.get("design_result", {}).get("iterations", 0),
              }, f)
          PYEOF

          # Cost is embedded in each workshop comment by workshop.py — write sentinel
          echo "cost embedded" > /tmp/cost_embedded

      - name: Post result comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          MODEL="${{ needs.parse.outputs.model }}"

          # Post a fallback comment if the workshop script crashed before writing usage data
          if [[ ! -f /tmp/llm_usage.json ]]; then
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ⚠️ Workshop process exited unexpectedly"
              echo ""
              echo "The workshop process exited unexpectedly — see run logs for details."
              echo ""
              echo "See the [workflow run logs]($RUN_URL) for full details."
            } > /tmp/failure_comment.md

            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/failure_comment.md
          fi

      - name: Post cost comment (fallback)
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          # Sentinel: if cost was embedded in workshop comments, skip
          if [ -f /tmp/cost_embedded ]; then
            echo "Cost already embedded in workshop comments — skipping fallback"
            exit 0
          fi
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")

          WORKSHOP_MAX_ITER="${{ needs.parse.outputs.workshop_max_iterations }}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${WORKSHOP_MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")

          {
            echo "⚠️ Workshop did not complete — partial cost:"
            echo ""
            echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
            echo ""
            echo "---"
            echo ""
            echo "### 💰 Cost"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Time | ${ELAPSED_FMT} |"
            echo "| Iterations | ${ITERATIONS_FMT} |"
            echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
            echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
            printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
          } > /tmp/cost_comment_fallback.md
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/cost_comment_fallback.md

  # --- Mode: delegate — full design-to-implementation cycle with no human pauses ---
  delegate:
    needs: parse
    if: needs.parse.outputs.mode == 'delegate'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Generate app token
        if: vars.RDB_APP_ID != ''
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}

      - name: Checkout target repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ needs.parse.outputs.target_branch }}

      - name: Checkout remote-dev-bot config
        uses: actions/checkout@v5
        with:
          repository: gnovak/remote-dev-bot
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          ref: ${{ inputs.rdb_ref }}
          path: .remote-dev-bot
          sparse-checkout: |
            /remote-dev-bot.yaml
            /lib/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install PyYAML litellm

      - name: Generate repo index
        run: |
          python3 .remote-dev-bot/lib/generate_index.py > /tmp/rdb-index.md
          EXTRA_FILES_RAW='${{ needs.parse.outputs.extra_files }}'
          RDB_EXTRA_FILES=$(python3 -c "import json,sys; raw=sys.argv[1]; files=json.loads(raw) if raw and raw not in ('null','') else []; files.append('/tmp/rdb-index.md'); print(json.dumps(files))" "$EXTRA_FILES_RAW")
          echo "RDB_EXTRA_FILES=$RDB_EXTRA_FILES" >> "$GITHUB_ENV"

      - name: Determine API key
        id: apikey
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          MODEL_HEADER="🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
          NO_API_KEY_WARNING="⚠️ **No API key configured for this model.**"
          post_no_api_key_comment() {
            local secret_name="$1"
            {
              printf '%s\n\n' "${MODEL_HEADER}"
              printf '%s\n\n' "${NO_API_KEY_WARNING}"
              printf 'The selected model \`%s\` (\`%s\`) requires an \`%s\` secret, but none was found.\n\n' "${ALIAS}" "${MODEL}" "${secret_name}"
              printf '**To fix:** Add your API key as a repository secret:\n'
              printf '\`\`\`bash\n'
              printf 'gh secret set %s --repo ${{ github.repository }}\n' "${secret_name}"
              printf '\`\`\`\n'
              printf 'Then re-trigger the bot by commenting the same command again.\n'
            } > /tmp/no_api_key_comment.md
            gh issue comment "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file /tmp/no_api_key_comment.md
          }

          if [[ "$MODEL" == anthropic/* ]]; then
            API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "ANTHROPIC_API_KEY"
              echo "::error::No ANTHROPIC_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == openai/* ]]; then
            API_KEY="${{ secrets.OPENAI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "OPENAI_API_KEY"
              echo "::error::No OPENAI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          elif [[ "$MODEL" == gemini/* ]]; then
            API_KEY="${{ secrets.GEMINI_API_KEY }}"
            if [[ -z "$API_KEY" ]]; then
              post_no_api_key_comment "GEMINI_API_KEY"
              echo "::error::No GEMINI_API_KEY secret configured for model: $MODEL"
              exit 1
            fi
            echo "key=$API_KEY" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unknown model provider for: $MODEL"
            exit 1
          fi

      - name: Gather issue context
        id: context
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}

          ISSUE_JSON=$(gh api repos/${{ github.repository }}/issues/${ISSUE_NUMBER})
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          ISSUE_BODY=$(echo "$ISSUE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body','') or '')")

          COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments?per_page=100")
          COMMENTS=$(echo "$COMMENTS_JSON" | python3 -c "
          import sys, json
          comments = json.load(sys.stdin)
          for c in reversed(comments):
              user = c['user']['login']
              body = c.get('body','')
              print(f'--- @{user} ---')
              print(body)
              print()
          ")

          echo "$ISSUE_TITLE" > /tmp/issue_title.txt
          echo "$ISSUE_BODY" > /tmp/issue_body.txt
          echo "$COMMENTS" > /tmp/issue_comments.txt
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      # ===================================================================
      # Stages 1-3: Design + Council Design Review + Design Revision
      # ===================================================================
      - name: Run delegate Stages 1-3 (design + council + revision)
        id: delegate_design
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TYPE: ${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          MAX_ITERATIONS: ${{ needs.parse.outputs.delegate_max_iterations }}
          COUNCIL_MODELS: ${{ needs.parse.outputs.council_models }}
          EXTRA_FILES: ${{ env.RDB_EXTRA_FILES }}
          WRAPUP_ENABLED: ${{ needs.parse.outputs.graceful_wrapup_enabled }}
          WRAPUP_ITERATION: ${{ needs.parse.outputs.graceful_wrapup_iteration }}
        run: |
          date +%s > /tmp/start_time
          python3 << 'PYEOF'
          import json
          import os
          import subprocess
          import sys

          sys.path.insert(0, ".remote-dev-bot/lib")

          from workshop import run_delegate

          model = os.environ["LLM_MODEL"]
          alias = "${{ needs.parse.outputs.alias }}"
          issue_number = os.environ["ISSUE_NUMBER"]
          github_repo = os.environ["GITHUB_REPO"]
          github_token = os.environ["GITHUB_TOKEN"]

          max_iterations = int(os.environ.get("MAX_ITERATIONS", "15") or "15")
          wrapup_enabled = os.environ.get("WRAPUP_ENABLED", "true").lower() == "true"
          wrapup_iteration = int(os.environ.get("WRAPUP_ITERATION", "0") or "0")

          council_models = json.loads(os.environ.get("COUNCIL_MODELS", "[]") or "[]")

          council_extra_instructions = "${{ needs.parse.outputs.extra_instructions }}"
          model_extra_instructions = "${{ needs.parse.outputs.model_extra_instructions }}"
          extra_instructions = "\n\n".join(p for p in [council_extra_instructions, model_extra_instructions] if p)

          # Generate repository file listing
          proc = subprocess.run(
              ["git", "ls-files"],
              capture_output=True, text=True
          )
          file_listing = proc.stdout.strip()
          extra_context = f"## Repository File Listing\n\n```\n{file_listing}\n```"

          # Read repo context files
          context_files = json.loads(os.environ.get("EXTRA_FILES", "[]") or "[]")
          for filepath in context_files:
              if os.path.exists(filepath):
                  with open(filepath) as f:
                      content = f.read().strip()
                  if content:
                      extra_context += f"\n\n## File: {filepath}\n\n{content}"

          with open("/tmp/issue_title.txt") as f:
              issue_title = f.read().strip()
          with open("/tmp/issue_body.txt") as f:
              issue_body = f.read().strip()
          with open("/tmp/issue_comments.txt") as f:
              issue_comments = f.read().strip()

          def post_comment(body):
              proc = subprocess.run(
                  ["gh", "issue", "comment", issue_number,
                   "--repo", github_repo,
                   "--body", body],
                  env={**os.environ, "GH_TOKEN": github_token},
                  capture_output=True, text=True,
              )
              if proc.returncode != 0:
                  print(f"Warning: failed to post comment: {proc.stderr}", file=sys.stderr)

          delegate_result = run_delegate(
              model=model,
              model_alias=alias,
              council_models=council_models,
              issue_title=issue_title,
              issue_body=issue_body,
              issue_comments=issue_comments,
              extra_instructions=extra_instructions,
              council_extra_instructions=council_extra_instructions,
              extra_context=extra_context,
              max_iterations=max_iterations,
              wrapup_enabled=wrapup_enabled,
              wrapup_iteration=wrapup_iteration,
              post_comment_fn=post_comment,
          )

          # Save usage data
          usage_data = {
              "input_tokens": delegate_result.get("total_input_tokens", 0),
              "output_tokens": delegate_result.get("total_output_tokens", 0),
              "cost": delegate_result.get("total_cost", 0.0),
              "iterations": delegate_result.get("design_result", {}).get("iterations", 0),
          }
          with open("/tmp/llm_usage.json", "w") as f:
              json.dump(usage_data, f)
          # Also save a copy so we can merge with Stage 4 costs later
          # (resolve.py will overwrite /tmp/llm_usage.json)
          with open("/tmp/delegate_stages_1_3_usage.json", "w") as f:
              json.dump(usage_data, f)

          # Save revised design for Stage 4
          revised_design = delegate_result.get("revised_design", "")
          if revised_design:
              with open("/tmp/delegate_revised_design.txt", "w") as f:
                  f.write(revised_design)
              print("Revised design saved for Stage 4")
          else:
              print("WARNING: No revised design produced — Stage 4 will run without design context")

          # Signal whether Stages 1-3 produced a usable design
          if not delegate_result.get("design_analysis"):
              with open("/tmp/delegate_abort.txt", "w") as f:
                  f.write("Design stage produced no output")
              print("ABORT: Design stage produced no output")
          PYEOF

          echo "cost embedded" > /tmp/cost_embedded

      # ===================================================================
      # Stage 4: Implementation (resolve with revised design as context)
      # ===================================================================
      - name: Check if delegate should continue to Stage 4
        id: check_abort
        run: |
          if [[ -f /tmp/delegate_abort.txt ]]; then
            echo "abort=true" >> "$GITHUB_OUTPUT"
            echo "Delegate pipeline aborted: $(cat /tmp/delegate_abort.txt)"
          else
            echo "abort=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve issue (Stage 4)
        if: steps.check_abort.outputs.abort != 'true'
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GIT_USERNAME: ${{ github.repository_owner }}
          E2E_TEST_TOKEN: ${{ secrets.E2E_TEST_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TYPE: ${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}
          TARGET_BRANCH: ${{ needs.parse.outputs.target_branch }}
          TARGET_BRANCH_EXPLICIT: ${{ needs.parse.outputs.target_branch_explicit }}
          PR_TYPE: ${{ needs.parse.outputs.pr_type }}
          ON_FAILURE: ${{ needs.parse.outputs.on_failure }}
          MAX_ITERATIONS: ${{ needs.parse.outputs.max_iterations }}
          WRAPUP_ENABLED: ${{ needs.parse.outputs.graceful_wrapup_enabled }}
          WRAPUP_ITERATION: ${{ needs.parse.outputs.graceful_wrapup_iteration }}
          STATUS_LOG_INTERVAL: ${{ needs.parse.outputs.status_log_interval }}
          ALIAS: ${{ needs.parse.outputs.alias }}
          EXTRA_FILES: ${{ env.RDB_EXTRA_FILES }}
          EXTRA_INSTRUCTIONS: ${{ needs.parse.outputs.extra_instructions }}
          MODEL_EXTRA_INSTRUCTIONS: ${{ needs.parse.outputs.model_extra_instructions }}
          DEBUG_LOGGING: ${{ needs.parse.outputs.debug_logging }}
          DISTILL_ENABLED: ${{ needs.parse.outputs.distill_enabled }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          ISSUE_TYPE="${{ (github.event.issue.pull_request || github.event.pull_request) && 'pr' || 'issue' }}"
          TARGET_BRANCH_EXPLICIT="${{ needs.parse.outputs.target_branch_explicit }}"

          if [[ "$ISSUE_TYPE" == "pr" && "$TARGET_BRANCH_EXPLICIT" != "true" ]]; then
            TARGET_BRANCH=$(gh pr view "$ISSUE_NUMBER" --json baseRefName --jq '.baseRefName')
            export TARGET_BRANCH
          fi

          # Pass revised design from Stages 1-3 as extra context for the resolve agent
          if [[ -f /tmp/delegate_revised_design.txt ]]; then
            export EXTRA_CONTEXT=$(cat /tmp/delegate_revised_design.txt)
            echo "Passing revised design as extra context to resolve agent"
          fi

          # Post Stage 4 start comment
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "## 🔨 Delegate Stage 4/6 — Implementation

          Running resolve agent with \`${{ needs.parse.outputs.alias }}\` (\`${{ needs.parse.outputs.model }}\`) to implement the revised design..."

          TIMEOUT_MINUTES="${{ needs.parse.outputs.timeout_minutes }}"
          TIMEOUT_SECONDS=$((TIMEOUT_MINUTES * 60))
          echo "Resolver timeout: ${TIMEOUT_MINUTES} minutes"

          timeout --kill-after=60 "$TIMEOUT_SECONDS" \
            python3 -u .remote-dev-bot/lib/resolve.py
          RESOLVE_EXIT_CODE=$?

          if [[ $RESOLVE_EXIT_CODE -eq 124 ]]; then
            echo "::warning::Resolver timed out after ${TIMEOUT_MINUTES} minutes. Cleanup steps will still run."
          fi

          exit $RESOLVE_EXIT_CODE

      - name: Merge Stage 4 costs
        if: steps.check_abort.outputs.abort != 'true'
        run: |
          # resolve.py overwrites /tmp/llm_usage.json with Stage 4 data.
          # We saved Stages 1-3 data before Stage 4 ran, so merge them.
          python3 << 'PYEOF'
          import json, os

          # After Stage 4, /tmp/llm_usage.json has been overwritten by resolve.py
          stage4 = {}
          if os.path.exists("/tmp/llm_usage.json"):
              with open("/tmp/llm_usage.json") as f:
                  stage4 = json.load(f)

          # Stages 1-3 data was saved before resolve ran
          stages_1_3 = {}
          if os.path.exists("/tmp/delegate_stages_1_3_usage.json"):
              with open("/tmp/delegate_stages_1_3_usage.json") as f:
                  stages_1_3 = json.load(f)

          combined = {
              "input_tokens": stages_1_3.get("input_tokens", 0) + stage4.get("input_tokens", 0),
              "output_tokens": stages_1_3.get("output_tokens", 0) + stage4.get("output_tokens", 0),
              "cost": (stages_1_3.get("cost") or 0.0) + (stage4.get("cost") or 0.0),
              "iterations": stage4.get("iterations", 0),
          }
          with open("/tmp/llm_usage.json", "w") as f:
              json.dump(combined, f)
          print(f"Merged costs: Stages 1-3 ${stages_1_3.get('cost', 0):.2f} + Stage 4 ${stage4.get('cost', 0):.2f} = ${combined['cost']:.2f}")
          PYEOF

      - name: Safety-net push
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          NO_OP=$(python3 -c "import json,os; d=json.load(open('/tmp/resolve_status.json')) if os.path.exists('/tmp/resolve_status.json') else {}; print('true' if d.get('no_op') else 'false')" 2>/dev/null || echo "false")
          if [[ "$NO_OP" == "true" ]]; then
            echo "no_op run — skipping safety-net push"
            exit 0
          fi
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "WIP: auto-saved by workflow (agent did not commit before exiting)"
            echo "Committed uncommitted changes"
          fi
          git push origin HEAD 2>/dev/null || echo "Push failed or nothing to push"

      # ===================================================================
      # Stage 5: Council Code Review (same as build Stage 2)
      # ===================================================================
      - name: Run council code review (Stage 5)
        if: steps.check_abort.outputs.abort != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          COUNCIL_MODELS: ${{ needs.parse.outputs.council_models }}
          GITHUB_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)

          if [[ -z "$PR_URL" ]]; then
            NO_OP=$(python3 -c "import json; d=json.load(open('/tmp/resolve_status.json')) if __import__('os').path.exists('/tmp/resolve_status.json') else {}; print('true' if d.get('no_op') else 'false')")
            if [[ "$NO_OP" == "true" ]]; then
              echo "Agent signaled no_op — no PR to review. Skipping council code review."
              exit 0
            fi
            echo "No PR URL found — resolve may have failed. Posting notice and skipping council code review."
            gh issue comment "$ISSUE_NUMBER" \
              --repo "$GITHUB_REPO" \
              --body "## 🏛️ Delegate Stage 5/6 — Council Code Review

          ⚠️ **Skipped** — the implementation stage did not produce a pull request. Council code review requires a PR to review. See the [workflow run logs]($RUN_URL) for details."
            exit 0
          fi

          export PR_URL

          # Post Stage 5 start comment
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPO" \
            --body "## 🏛️ Delegate Stage 5/6 — Council Code Review

          Running council code review on the implementation PR..."

          python3 << 'PYEOF'
          import json
          import os
          import re
          import subprocess
          import sys

          sys.path.insert(0, ".remote-dev-bot/lib")
          from workshop import run_build_council

          github_repo = os.environ["GITHUB_REPO"]
          github_token = os.environ["GH_TOKEN"]
          pr_url = os.environ.get("PR_URL", "")
          issue_number = os.environ["ISSUE_NUMBER"]

          pr_number_match = re.search(r'/pull/(\d+)$', pr_url)
          if not pr_number_match:
              print("No PR number found in URL, exiting")
              sys.exit(0)
          pr_number = pr_number_match.group(1)

          env = {**os.environ, "GH_TOKEN": github_token}

          pr_json = subprocess.run(
              ["gh", "api", f"repos/{github_repo}/pulls/{pr_number}"],
              capture_output=True, text=True, env=env,
          ).stdout
          pr_data = json.loads(pr_json)
          pr_title = pr_data.get("title", "")
          pr_body = pr_data.get("body", "") or ""

          diff_result = subprocess.run(
              ["gh", "api", f"repos/{github_repo}/pulls/{pr_number}",
               "--header", "Accept: application/vnd.github.diff"],
              capture_output=True, text=True, env=env,
          )
          pr_diff = diff_result.stdout[:40000]

          issue_json = subprocess.run(
              ["gh", "api", f"repos/{github_repo}/issues/{issue_number}"],
              capture_output=True, text=True, env=env,
          ).stdout
          issue_data = json.loads(issue_json)
          issue_title = issue_data.get("title", "")
          issue_body_text = issue_data.get("body", "") or ""

          council_models = json.loads(os.environ.get("COUNCIL_MODELS", "[]") or "[]")
          council_extra_instructions = "${{ needs.parse.outputs.extra_instructions }}"

          def post_pr_comment(body):
              proc = subprocess.run(
                  ["gh", "pr", "comment", pr_number,
                   "--repo", github_repo,
                   "--body", body],
                  env=env,
                  capture_output=True, text=True,
              )
              if proc.returncode != 0:
                  print(f"Warning: failed to post PR comment: {proc.stderr}", file=sys.stderr)

          build_result = run_build_council(
              council_models=council_models,
              issue_title=issue_title,
              issue_body=issue_body_text,
              pr_title=pr_title,
              pr_body=pr_body,
              pr_diff=pr_diff,
              extra_instructions=council_extra_instructions,
              post_comment_fn=post_pr_comment,
          )

          # Merge council usage into aggregate
          existing = {}
          if os.path.exists("/tmp/llm_usage.json"):
              with open("/tmp/llm_usage.json") as f:
                  existing = json.load(f)

          combined = {
              "input_tokens": existing.get("input_tokens", 0) + build_result["total_input_tokens"],
              "output_tokens": existing.get("output_tokens", 0) + build_result["total_output_tokens"],
              "cost": (existing.get("cost") or 0.0) + build_result["total_cost"],
              "iterations": existing.get("iterations", 0),
          }
          with open("/tmp/llm_usage.json", "w") as f:
              json.dump(combined, f)

          # Save council results for Stage 6
          reviews = []
          for cr in build_result.get("council_results", []):
              reviews.append({
                  "model_alias": cr.get("model_alias", ""),
                  "review": cr.get("review", ""),
              })
          with open("/tmp/delegate_code_reviews.json", "w") as f:
              json.dump(reviews, f)
          PYEOF

      # ===================================================================
      # Stage 6: Code Revision Plan
      # ===================================================================
      - name: Run code revision plan (Stage 6)
        if: steps.check_abort.outputs.abort != 'true'
        env:
          LLM_API_KEY: ${{ steps.apikey.outputs.key }}
          LLM_MODEL: ${{ needs.parse.outputs.model }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
          GITHUB_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)

          if [[ -z "$PR_URL" || ! -f /tmp/delegate_code_reviews.json ]]; then
            echo "No PR or no code reviews — skipping Stage 6"
            exit 0
          fi

          export PR_URL
          python3 << 'PYEOF'
          import json
          import os
          import re
          import subprocess
          import sys

          sys.path.insert(0, ".remote-dev-bot/lib")
          from workshop import _run_revision_call, CODE_REVISION_SYSTEM_PROMPT

          model = os.environ["LLM_MODEL"]
          alias = "${{ needs.parse.outputs.alias }}"
          github_repo = os.environ["GITHUB_REPO"]
          github_token = os.environ["GH_TOKEN"]
          issue_number = os.environ["ISSUE_NUMBER"]
          pr_url = os.environ.get("PR_URL", "")

          pr_number_match = re.search(r'/pull/(\d+)$', pr_url)
          if not pr_number_match:
              print("No PR number found, exiting")
              sys.exit(0)
          pr_number = pr_number_match.group(1)

          env = {**os.environ, "GH_TOKEN": github_token}

          # Fetch PR diff
          diff_result = subprocess.run(
              ["gh", "api", f"repos/{github_repo}/pulls/{pr_number}",
               "--header", "Accept: application/vnd.github.diff"],
              capture_output=True, text=True, env=env,
          )
          pr_diff = diff_result.stdout[:40000]

          # Load code reviews from Stage 5
          with open("/tmp/delegate_code_reviews.json") as f:
              reviews = json.load(f)

          critiques_text = "\n\n---\n\n".join(
              f"### Code Review by {r['model_alias']}\n\n{r['review']}"
              for r in reviews
          )

          user_content = (
              f"## PR Diff\n\n```diff\n{pr_diff}\n```\n\n"
              f"## Code Reviews\n\n{critiques_text}\n\n"
              f"---\n\n"
              f"Please produce a concrete revision plan addressing the code review feedback."
          )

          extra_instructions = "${{ needs.parse.outputs.extra_instructions }}"
          model_extra_instructions = "${{ needs.parse.outputs.model_extra_instructions }}"
          combined_instructions = "\n\n".join(p for p in [extra_instructions, model_extra_instructions] if p)

          revision_result = _run_revision_call(
              model_id=model,
              system_prompt=CODE_REVISION_SYSTEM_PROMPT,
              user_content=user_content,
              extra_instructions=combined_instructions,
              max_tokens=8192,
          )

          revision_text = revision_result["text"]

          # Post revision plan as a PR comment
          def post_pr_comment(body):
              proc = subprocess.run(
                  ["gh", "pr", "comment", pr_number,
                   "--repo", github_repo,
                   "--body", body],
                  env=env,
                  capture_output=True, text=True,
              )
              if proc.returncode != 0:
                  print(f"Warning: failed to post PR comment: {proc.stderr}", file=sys.stderr)

          post_pr_comment(
              f"## 🔄 Delegate Stage 6/6 — Code Revision Plan\n\n"
              f"🤖 **Model:** `{alias}` (`{model}`)\n\n"
              f"{revision_text}\n\n"
              f"---\n"
              f"_Code revision plan by `/agent-delegate` Stage 6 (`{alias}`)_"
          )

          # Also post on the issue for visibility
          proc = subprocess.run(
              ["gh", "issue", "comment", issue_number,
               "--repo", github_repo,
               "--body", f"## 🔄 Delegate Stage 6/6 — Code Revision Plan\n\nPosted as a comment on {pr_url}"],
              env=env,
              capture_output=True, text=True,
          )

          # Merge Stage 6 usage into aggregate
          existing = {}
          if os.path.exists("/tmp/llm_usage.json"):
              with open("/tmp/llm_usage.json") as f:
                  existing = json.load(f)

          combined = {
              "input_tokens": existing.get("input_tokens", 0) + revision_result["input_tokens"],
              "output_tokens": existing.get("output_tokens", 0) + revision_result["output_tokens"],
              "cost": (existing.get("cost") or 0.0) + revision_result["cost"],
              "iterations": existing.get("iterations", 0),
          }
          with open("/tmp/llm_usage.json", "w") as f:
              json.dump(combined, f)
          PYEOF

      # ===================================================================
      # Post-pipeline: result comment + cost reporting
      # ===================================================================
      - name: Post result comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          ON_FAILURE="${{ needs.parse.outputs.on_failure }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          MODEL="${{ needs.parse.outputs.model }}"

          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          DELEGATE_MAX_ITER="${{ needs.parse.outputs.delegate_max_iterations }}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${DELEGATE_MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")

          # Check pipeline result
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)

          if [[ -f /tmp/delegate_abort.txt ]]; then
            ABORT_REASON=$(cat /tmp/delegate_abort.txt)
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ⚠️ Delegate pipeline aborted"
              echo ""
              echo "**Reason:** ${ABORT_REASON}"
              echo ""
              echo "See the [workflow run logs]($RUN_URL) for full details."
              echo ""
              echo "### 💰 Cost"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Time | ${ELAPSED_FMT} |"
              echo "| Iterations | ${ITERATIONS_FMT} |"
              echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
              echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
              printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
            } > /tmp/delegate_result_comment.md
          elif [[ -n "$PR_URL" ]]; then
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ✅ Delegate pipeline complete"
              echo ""
              echo "**PR:** ${PR_URL}"
              echo ""
              echo "The full design-to-implementation cycle is complete:"
              echo "1. ✅ Design exploration"
              echo "2. ✅ Council design review"
              echo "3. ✅ Design revision"
              echo "4. ✅ Implementation (resolve)"
              echo "5. ✅ Council code review"
              echo "6. ✅ Code revision plan"
              echo ""
              echo "See the [workflow run logs]($RUN_URL) for full details."
              echo ""
              echo "### 💰 Cost"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Time | ${ELAPSED_FMT} |"
              echo "| Iterations | ${ITERATIONS_FMT} |"
              echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
              echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
              printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
            } > /tmp/delegate_result_comment.md
          else
            {
              echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
              echo ""
              echo "### ⚠️ Delegate pipeline did not produce a PR"
              echo ""
              echo "The implementation stage did not create a pull request."
              echo ""
              echo "See the [workflow run logs]($RUN_URL) for full details."
              echo ""
              echo "### 💰 Cost"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Time | ${ELAPSED_FMT} |"
              echo "| Iterations | ${ITERATIONS_FMT} |"
              echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
              echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
              printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
            } > /tmp/delegate_result_comment.md
          fi

          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/delegate_result_comment.md
          echo "cost embedded" > /tmp/cost_embedded

      - name: Assign triggerer to PR
        if: needs.parse.outputs.assign_pr == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log | head -1)
          if [ -z "$PR_URL" ]; then
            echo "Could not find PR URL in send_pull_request output, skipping assignment"
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --add-assignee "${{ github.event.comment.user.login }}"

      - name: Append cost to PR
        if: >-
          always() &&
          !(github.event.issue.pull_request || github.event.pull_request)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          PR_URL=$(grep -oE 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' /tmp/spr_output.log 2>/dev/null | head -1)
          if [ -z "$PR_URL" ]; then
            echo "No PR URL found — skipping cost append"
            exit 0
          fi

          ALIAS="${{ needs.parse.outputs.alias }}"
          MODEL="${{ needs.parse.outputs.model }}"
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))

          python3 << PYEOF
          import json, math, os

          elapsed = ${ELAPSED}
          alias = "${ALIAS}"
          model = "${MODEL}"

          usage = {}
          if os.path.exists("/tmp/llm_usage.json"):
              with open("/tmp/llm_usage.json") as f:
                  usage = json.load(f)

          inp = usage.get("input_tokens", 0)
          out = usage.get("output_tokens", 0)
          cost = usage.get("cost") or 0.0
          iters = usage.get("iterations", 0)

          def _fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)

          elapsed_fmt = f'{elapsed // 60}m {elapsed % 60}s' if elapsed >= 60 else f'{elapsed}s'
          rounded = math.ceil(cost * 100) / 100

          rows = [
              ('Time', elapsed_fmt),
              ('Iterations', str(iters)),
              ('Input', f'{_fmt(inp)} tokens'),
              ('Output', f'{_fmt(out)} tokens'),
              ('**Cost**', f'**\${rounded:.2f}**'),
          ]
          _tbl = ['---', '', '### 💰 Cost', '', '| Metric | Value |', '|--------|-------|']
          _tbl += [f'| {k} | {v} |' for k, v in rows]
          open('/tmp/cost_table.txt', 'w').write('\n'.join(_tbl))
          PYEOF

          if [ ! -f /tmp/cost_table.txt ]; then
            echo "Cost table generation failed — fallback step will handle it"
            exit 0
          fi

          CURRENT_BODY=$(gh pr view "$PR_URL" --json body --jq '.body' 2>/dev/null || echo "")
          COST_TABLE=$(cat /tmp/cost_table.txt)
          printf '%s\n\n%s\n' "$CURRENT_BODY" "$COST_TABLE" > /tmp/pr_new_body.txt

          gh pr edit "$PR_URL" --body-file /tmp/pr_new_body.txt
          echo "cost embedded" > /tmp/cost_embedded
          echo "Cost table appended to PR $PR_URL"

      - name: Post cost comment (fallback)
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}
        run: |
          if [ -f /tmp/cost_embedded ]; then
            echo "Cost already reported — skipping fallback"
            exit 0
          fi
          ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          MODEL="${{ needs.parse.outputs.model }}"
          ALIAS="${{ needs.parse.outputs.alias }}"
          ELAPSED=$(( $(date +%s) - $(cat /tmp/start_time 2>/dev/null || date +%s) ))
          ELAPSED_FMT=$(python3 -c "s=${ELAPSED}; print(f'{s//60}m {s%60}s' if s >= 60 else f'{s}s')")
          if [ -f /tmp/llm_usage.json ]; then
            read INPUT_TOKENS OUTPUT_TOKENS COST ITERATIONS < <(python3 -c "
          import json
          d = json.load(open('/tmp/llm_usage.json'))
          print(d.get('input_tokens', 0), d.get('output_tokens', 0), d.get('cost') or 0, d.get('iterations', 0))
          ")
          else
            INPUT_TOKENS=0; OUTPUT_TOKENS=0; COST=0; ITERATIONS=0
          fi
          DELEGATE_MAX_ITER="${{ needs.parse.outputs.delegate_max_iterations }}"
          ITERATIONS_FMT=$(python3 -c "
          max_i = '${DELEGATE_MAX_ITER}'
          iters = '${ITERATIONS}'
          print(f'{iters} / {max_i}' if max_i.isdigit() and int(max_i) > 0 else iters)
          ")
          ROUNDED=$(python3 -c "import math; print(f'{math.ceil(float(\"${COST:-0}\") * 100) / 100:.2f}')")
          IFS=$'\t' read INPUT_TOKENS_FMT OUTPUT_TOKENS_FMT < <(python3 -c "
          def fmt(n):
              if n >= 1_000_000:
                  v = n / 1_000_000
                  return f'{round(v)}M' if v >= 10 else f'{round(v, 1)}M'
              elif n >= 1_000:
                  v = n / 1_000
                  return f'{round(v)}K' if v >= 10 else f'{round(v, 1)}K'
              return str(n)
          print(fmt(${INPUT_TOKENS}), fmt(${OUTPUT_TOKENS}), sep='\t')
          ")
          {
            echo "🤖 **Model:** \`${ALIAS}\` (\`${MODEL}\`)"
            echo ""
            echo "⚠️ Delegate pipeline did not complete — partial cost:"
            echo ""
            echo "### 💰 Cost"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Time | ${ELAPSED_FMT} |"
            echo "| Iterations | ${ITERATIONS_FMT} |"
            echo "| Input | ${INPUT_TOKENS_FMT} tokens |"
            echo "| Output | ${OUTPUT_TOKENS_FMT} tokens |"
            printf "| **Cost** | **\$%s** |\n" "$ROUNDED"
          } > /tmp/cost_comment_fallback.md
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/cost_comment_fallback.md
