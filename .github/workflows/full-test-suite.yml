name: Full Test Suite
run-name: "Full Test Suite: ${{ github.ref_name }}"

on:
  workflow_dispatch:

# Sequential execution: all jobs use the same test repo, so they
# cannot run in parallel (shared e2e-test pointer, workflow files, issues).
#
# Failure strategy:
#   - unit-tests: fast-fail gate. If this fails, all e2e jobs are skipped.
#   - e2e-shim, e2e-security: continue-on-failure. Each block runs regardless
#     of whether the previous e2e block passed, so a single full-suite run
#     gives a comprehensive failure picture across all blocks.
#
# Implementation: e2e jobs use `if: always() && needs.unit-tests.result == 'success'`
# to skip on unit-test failure but continue past e2e failures.

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest PyYAML

      - name: Run unit tests
        run: pytest tests/ -v
        env:
          PYTHONPATH: .

  e2e-shim:
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        if: ${{ vars.RDB_APP_ID != '' }}
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Install PyYAML
        run: pip install PyYAML

      - name: Sanity check rdb-test shim
        env:
          GH_TOKEN: ${{ secrets.RDB_TESTER_PAT_TOKEN || github.token }}
        run: |
          # Verify that agent.yml in rdb-test is the shim (calls uses: gnovak/remote-dev-bot),
          # not a compiled workflow. If it has been left in a compiled state (e.g., from a
          # previous e2e-compiled run that was cancelled mid-cleanup), restore the shim now.
          TEST_REPO="gnovak/remote-dev-bot-test"
          echo "Checking rdb-test agent.yml..."
          agent_content=$(gh api "repos/$TEST_REPO/contents/.github/workflows/agent.yml" --jq '.content' | base64 -d)
          if echo "$agent_content" | grep -q "uses: gnovak/remote-dev-bot"; then
            echo "OK: agent.yml is the shim."
          else
            echo "WARNING: agent.yml does not look like a shim — it may be a compiled workflow."
            echo "Restoring shim from this repo's .github/workflows/agent.yml..."
            shim_content=$(base64 < .github/workflows/agent.yml | tr -d '\n')
            current_sha=$(gh api "repos/$TEST_REPO/contents/.github/workflows/agent.yml" --jq '.sha')
            gh api "repos/$TEST_REPO/contents/.github/workflows/agent.yml" \
              --method PUT \
              -f message="E2E sanity: restore shim before e2e-shim run" \
              -f content="$shim_content" \
              -f sha="$current_sha" >/dev/null
            echo "Shim restored. Waiting 10s for GitHub to register..."
            sleep 10
          fi

      - name: Run E2E tests (shim, all models)
        env:
          GH_TOKEN: ${{ secrets.RDB_TESTER_PAT_TOKEN || github.token }}
        run: ./tests/e2e.sh --branch ${{ inputs.branch }} --all-models

  e2e-compiled:
    needs: [unit-tests, e2e-shim]
    if: always() && needs.unit-tests.result == 'success'
    runs-on: ubuntu-latest
    # Longer timeout than e2e-shim: this job installs the compiled workflow, runs all-models
    # tests, then restores the shim. The compiled workflow swap adds overhead, and we need
    # headroom for the always-run cleanup step to complete even if tests fill the window.
    timeout-minutes: 60
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        if: ${{ vars.RDB_APP_ID != '' }}
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Install PyYAML
        run: pip install PyYAML

      - name: Run E2E tests (shim, all models)
        env:
          GH_TOKEN: ${{ secrets.RDB_TESTER_PAT_TOKEN || github.token }}
        run: ./tests/e2e.sh --branch ${{ github.ref_name }} --all-models

  e2e-security:
    needs: [unit-tests, e2e-shim]
    if: always() && needs.unit-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        if: ${{ vars.RDB_APP_ID != '' }}
        with:
          app-id: ${{ vars.RDB_APP_ID }}
          private-key: ${{ secrets.RDB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || secrets.RDB_PAT_TOKEN || github.token }}

      - name: Run security E2E tests
        env:
          GH_TOKEN: ${{ secrets.RDB_TESTER_PAT_TOKEN || github.token }}
          UNAUTHORIZED_PAT: ${{ secrets.RDB_TESTER_UNAUTHORIZED_PAT_TOKEN }}
        run: ./tests/e2e-security.sh --branch ${{ github.ref_name }}
