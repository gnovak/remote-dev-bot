name: Setup RDB
description: >
  Composite action for remote-dev-bot job setup: generate app token,
  checkout target repository, checkout rdb lib/config, and set up Python.

inputs:
  app_id:
    description: 'GitHub App ID (vars.RDB_APP_ID)'
    required: false
    default: ''
  app_private_key:
    description: 'GitHub App private key (secrets.RDB_APP_PRIVATE_KEY)'
    required: false
    default: ''
  pat_token:
    description: 'PAT token for checkout and API calls (secrets.RDB_PAT_TOKEN)'
    required: false
    default: ''
  rdb_ref:
    description: 'Branch or tag of remote-dev-bot to checkout for lib/config files'
    required: true
  target_ref:
    description: 'Ref to checkout for the target repository (empty = default branch)'
    required: false
    default: ''
  fetch_depth:
    description: 'fetch-depth for target repository checkout (0 = full history)'
    required: false
    default: '1'
  include_rdb_config:
    description: 'Whether to include /remote-dev-bot.yaml in the sparse checkout'
    required: false
    default: 'true'
  app_token_owner:
    description: >-
      Optional: scope the generated app token to all repos under this owner
      that have the App installed. Empty (default) keeps the token scoped to
      the current repo only. Used by the rdb-internal dogfood shim so
      self-debugging agents can read other repos owned by the same user;
      not set by the public agent.yml shim.
    required: false
    default: ''

outputs:
  token:
    description: 'Generated GitHub App token (or empty string if app not configured)'
    value: ${{ steps.app-token.outputs.token }}

runs:
  using: composite
  steps:
    - name: Generate app token
      uses: actions/create-github-app-token@v3
      id: app-token
      if: ${{ inputs.app_id != '' }}
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: ${{ inputs.app_token_owner }}

    - name: Checkout target repository
      uses: actions/checkout@v5
      with:
        token: ${{ steps.app-token.outputs.token || inputs.pat_token || github.token }}
        ref: ${{ inputs.target_ref }}
        fetch-depth: ${{ inputs.fetch_depth }}
        # Don't `git clean -ffdx` the workspace before checking out — the
        # caller pre-fetched this composite action's source into
        # .rdb-action/ and that subdir must survive so GHA can re-read
        # action.yml at post-step time. The runner workspace is fresh
        # per job so leftover-file risk is nil.
        clean: false

    - name: Checkout remote-dev-bot config and lib
      if: ${{ inputs.include_rdb_config == 'true' }}
      uses: actions/checkout@v5
      with:
        repository: gnovak/remote-dev-bot
        token: ${{ steps.app-token.outputs.token || inputs.pat_token || github.token }}
        ref: ${{ inputs.rdb_ref }}
        path: .remote-dev-bot
        sparse-checkout: |
          /remote-dev-bot.yaml
          /lib/
        sparse-checkout-cone-mode: false

    - name: Checkout remote-dev-bot lib
      if: ${{ inputs.include_rdb_config != 'true' }}
      uses: actions/checkout@v5
      with:
        repository: gnovak/remote-dev-bot
        token: ${{ steps.app-token.outputs.token || inputs.pat_token || github.token }}
        ref: ${{ inputs.rdb_ref }}
        path: .remote-dev-bot
        sparse-checkout: |
          /lib/
        sparse-checkout-cone-mode: false

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
